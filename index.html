<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Niveni | Catálogo Premium de Flores Artesanales</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  
  <style>
    /* ====================================================================== */
    /* 2_ESTILOS_CSS_VARIABLES                                                */
    /* ====================================================================== */
    :root {
      --color-crema: #fdfcf8;
      --color-acento: #c5a8a0;
      --color-oscuro: #4a4543;
      --color-wpp: #25d366;
      --color-wpp-fondo: #f0fdf4;
      --color-wpp-borde: #bbf7d0;
      --color-blanco: #ffffff;
      --color-cristal: rgba(255, 255, 255, 0.85);
      --fuente-principal: 'Segoe UI', sans-serif;
      --sombra-tarjeta: 0 10px 20px rgba(0,0,0,0.03);
      --radio-borde: 20px;
      --radio-borde-hud: 20px;
    }

    /* ====================================================================== */
    /* 3_ESTILOS_CSS_COMPONENTES (MINIMALISMO Y RENDIMIENTO)                  */
    /* ====================================================================== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      /* FONDO SUAVE Y MINIMALISTA: Gradiente radial que simula luz de estudio */
      background: radial-gradient(circle at top center, #ffffff 0%, var(--color-crema) 100%);
      background-attachment: fixed;
      color: var(--color-oscuro);
      font-family: var(--fuente-principal);
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* CAPA SUPERIOR FIXED - INTERFAZ CRISTAL COMPACTA */
    .interfaz-fija {
      position: sticky;
      top: 0;
      z-index: 100;
      background-color: var(--color-cristal);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-bottom: 1px solid rgba(197, 168, 160, 0.15);
      padding: 15px 15px 10px 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      animation: aparecerTop 0.5s ease-out;
    }

    .titulo-marca {
      font-weight: 200;
      letter-spacing: 10px;
      font-size: 2.2rem;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .bloque-buscador {
      width: 100%;
      max-width: 400px;
      position: relative;
      margin-bottom: 10px;
    }

    .bloque-buscador input {
      width: 100%;
      padding: 10px 15px 10px 35px;
      border-radius: var(--radio-borde-hud);
      border: 1px solid rgba(197, 168, 160, 0.4);
      background-color: rgba(255, 255, 255, 0.8);
      font-size: 0.9rem;
      outline: none;
      transition: all 0.3s ease;
    }

    .bloque-buscador input:focus {
      border-color: var(--color-acento);
      box-shadow: 0 4px 15px rgba(197, 168, 160, 0.1);
    }

    .bloque-buscador i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-acento);
      font-size: 0.9rem;
    }

    .contenedor-hud {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .boton-filtro {
      padding: 6px 18px;
      border-radius: var(--radio-borde-hud);
      border: 1px solid var(--color-acento);
      background-color: transparent;
      color: var(--color-acento);
      font-weight: 600;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
    }

    .boton-filtro:hover {
      background-color: rgba(197, 168, 160, 0.08);
    }

    .filtro-activo {
      background-color: var(--color-acento) !important;
      color: var(--color-blanco) !important;
    }

    /* MATRIZ SIMÉTRICA (40% MÁS COMPACTA) */
    .panel-catalogo {
      flex-grow: 1;
      overflow-y: auto;
      padding: 20px 15px;
      scroll-behavior: smooth;
    }

    .panel-catalogo::-webkit-scrollbar { width: 5px; }
    .panel-catalogo::-webkit-scrollbar-thumb { background-color: rgba(197, 168, 160, 0.3); border-radius: 5px; }

    .matriz-simetrica {
      display: grid;
      /* REDUCCIÓN DE ESCALA APLICADA AQUÍ */
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 15px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* TARJETAS MINIATURIZADAS */
    .tarjeta-item {
      background-color: var(--color-blanco);
      border-radius: var(--radio-borde);
      padding: 10px;
      box-shadow: var(--sombra-tarjeta);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      display: flex;
      flex-direction: column;
      opacity: 0;
      animation: entradaCascada 0.4s forwards ease-out;
    }

    .tarjeta-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.06);
    }

    .imagen-item {
      width: 100%;
      height: 180px; /* Reducción de 350px a 180px */
      object-fit: cover;
      border-radius: 15px;
      cursor: zoom-in;
    }

    .info-item {
      padding: 10px 5px 5px 5px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .texto-grupo {
      font-size: 0.65rem;
      color: #bfa39b;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 2px;
      font-weight: bold;
    }

    .texto-nombre {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--color-oscuro);
      line-height: 1.2;
      flex-grow: 1;
    }

    .texto-precio {
      font-weight: 800;
      color: var(--color-acento);
      font-size: 1.1rem;
      margin-top: 5px;
    }

    /* BOTONERA DUAL DE WHATSAPP (OPCIÓN B) */
    .contenedor-wpp-dual {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .btn-wpp-sm {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 5px;
      background-color: var(--color-wpp-fondo);
      color: var(--color-wpp);
      border: 1px solid var(--color-wpp-borde);
      padding: 8px 0;
      border-radius: 10px;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 700;
      transition: all 0.2s;
    }

    .btn-wpp-sm:hover {
      background-color: var(--color-wpp);
      color: var(--color-blanco);
      transform: scale(1.05);
    }

    /* MODAL ZOOM */
    .modal-zoom {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(10, 10, 10, 0.94);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      backdrop-filter: blur(10px);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .modal-activo {
      display: flex !important;
      opacity: 1 !important;
    }

    .imagen-zoom {
      max-width: 90%;
      max-height: 90%;
      border-radius: 20px;
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
      transform: scale(0.8);
      transition: transform 0.3s ease-out;
    }

    .modal-activo .imagen-zoom {
      transform: scale(1);
    }

    @keyframes aparecerTop {
      0% { opacity: 0; transform: translateY(-15px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes entradaCascada {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="interfaz-fija">
    <h1 class="titulo-marca">NIVENI</h1>
    
    <div class="bloque-buscador">
      <i class="fas fa-search"></i>
      <input type="text" id="buscador-vivo" placeholder="Buscar flor artesanal...">
    </div>

    <nav id="contenedor-hud" class="contenedor-hud"></nav>
  </div>

  <main class="panel-catalogo">
    <div id="contenedor-matriz" class="matriz-simetrica">
      </div>
  </main>

  <div id="zoom-modal" class="modal-zoom">
    <img id="imagen-ampliada" class="imagen-zoom" src="">
  </div>

  <script>
    // Señor de la vida®
    // ======================================================================
    // 5_JAVASCRIPT_ESTADO_GLOBAL
    // ======================================================================
    const ConfiguracionFirebase = {};
    ConfiguracionFirebase.apiKey = "AIzaSyBqsTxi2PoFjPgvre4QqZvWHczUoO5sqU8";
    ConfiguracionFirebase.projectId = "limpiapipas-98f13";
    ConfiguracionFirebase.appId = "1:456357010113:web:c10522df7cdb2dbea1d240";

    const VECTORES_WPP = {
      linea1: "59178593184",
      linea2: "59177047557"
    };

    const EstadoAplicacion = {};
    EstadoAplicacion.datosProcesados = [];
    EstadoAplicacion.categoriasUnicas = [];
    EstadoAplicacion.filtroActivo = "TODO";
    EstadoAplicacion.textoBusqueda = "";

    // ======================================================================
    // 6_JAVASCRIPT_UTILIDADES
    // ======================================================================
    const Utilidades = {};

    Utilidades.crearEnlaceWpp = function(nombreFlorLimpio, numeroAsignado) {
      let base = "https://wa.me/" + numeroAsignado + "?text=";
      let mensaje = "Hola Niveni, me interesa la hermosa flor artesanal: ";
      let textoCompleto = mensaje + nombreFlorLimpio;
      let urlCodificada = encodeURI(textoCompleto);
      return base + urlCodificada;
    };

    Utilidades.diseccionarNombre = function(cadenaCruda) {
      let cadenaSegura = cadenaCruda || "";
      let contieneGuionMedio = cadenaSegura.includes('-');
      let resultadoDiseccion = {};
      
      if (contieneGuionMedio) {
        let fragmentos = cadenaSegura.split('-');
        let primeraParte = fragmentos[0];
        let restoDelArreglo = fragmentos.slice(1);
        let restoUnido = restoDelArreglo.join(' '); 
        
        let categoriaLimpia = primeraParte.trim();
        let categoriaMayusculas = categoriaLimpia.toUpperCase();
        let nombreFlorLimpio = restoUnido.trim();
        
        resultadoDiseccion.grupo = categoriaMayusculas;
        resultadoDiseccion.nombre = nombreFlorLimpio;
      } else {
        let cadenaLimpia = cadenaSegura.trim();
        resultadoDiseccion.grupo = "GENERAL";
        resultadoDiseccion.nombre = cadenaLimpia;
      }
      
      return resultadoDiseccion;
    };

    // ======================================================================
    // 7_JAVASCRIPT_MOTORES_LOGICOS Y RENDER
    // ======================================================================
    const MotorConexion = {};
    MotorConexion.iniciar = function() {
      firebase.initializeApp(ConfiguracionFirebase);
      let baseDatos = firebase.firestore();
      baseDatos.enablePersistence().catch(function(e) { console.warn("Offline fallback fallido."); });
      return baseDatos;
    };

    const MotorUI = {};
    MotorUI.referencias = {};
    
    MotorUI.mapearNodos = function() {
      MotorUI.referencias.matriz = document.getElementById('contenedor-matriz');
      MotorUI.referencias.modal = document.getElementById('zoom-modal');
      MotorUI.referencias.imagenAmpliada = document.getElementById('imagen-ampliada');
      MotorUI.referencias.hud = document.getElementById('contenedor-hud');
      MotorUI.referencias.buscador = document.getElementById('buscador-vivo');
    };

    MotorUI.renderizarHUD = function() {
      let contenedorHUD = MotorUI.referencias.hud;
      contenedorHUD.innerHTML = "";
      
      let btnTodo = document.createElement('button');
      btnTodo.className = "boton-filtro";
      btnTodo.textContent = "TODO";
      btnTodo.dataset.categoria = "TODO";
      
      let activoEsTodo = EstadoAplicacion.filtroActivo === "TODO";
      if (activoEsTodo) btnTodo.classList.add('filtro-activo');
      
      contenedorHUD.appendChild(btnTodo);
      
      let indiceCat = 0;
      let totalCat = EstadoAplicacion.categoriasUnicas.length;
      
      while (indiceCat < totalCat) {
        let nombreCategoria = EstadoAplicacion.categoriasUnicas[indiceCat];
        let esCategoriaInvalida = nombreCategoria === "GENERAL" || nombreCategoria === "";
        
        if (!esCategoriaInvalida) {
          let btnCat = document.createElement('button');
          btnCat.className = "boton-filtro";
          btnCat.textContent = nombreCategoria;
          btnCat.dataset.categoria = nombreCategoria;
          
          let estaActivo = EstadoAplicacion.filtroActivo === nombreCategoria;
          if (estaActivo) btnCat.classList.add('filtro-activo');
          
          contenedorHUD.appendChild(btnCat);
        }
        indiceCat = indiceCat + 1;
      }
    };

    MotorUI.renderizarCatalogo = function() {
      let nodoContenedor = MotorUI.referencias.matriz;
      nodoContenedor.innerHTML = "";
      
      let indiceElemento = 0;
      let indiceVisual = 0; 
      let totalItems = EstadoAplicacion.datosProcesados.length;
      
      let filtroActual = EstadoAplicacion.filtroActivo;
      let busquedaActual = EstadoAplicacion.textoBusqueda.trim().toUpperCase();
      
      while (indiceElemento < totalItems) {
        let item = EstadoAplicacion.datosProcesados[indiceElemento];
        
        let esTodo = filtroActual === "TODO";
        let coincideGrupo = item.grupo === filtroActual;
        let pasaFiltroCategoria = esTodo || coincideGrupo;
        
        let textoFlor = item.nombre.toUpperCase();
        let pasaFiltroTexto = textoFlor.includes(busquedaActual);
        
        let seDebeMostrar = pasaFiltroCategoria && pasaFiltroTexto;
        
        if (seDebeMostrar) {
          let tarjeta = document.createElement('div');
          tarjeta.className = "tarjeta-item";
          
          let retrasoAnimacion = indiceVisual * 0.03;
          tarjeta.style.animationDelay = retrasoAnimacion.toString() + "s";
          
          let imagen = document.createElement('img');
          imagen.className = "imagen-item";
          imagen.src = item.img || item.direccion || "";
          imagen.dataset.url = imagen.src;
          imagen.loading = "lazy";
          
          let infoContenedor = document.createElement('div');
          infoContenedor.className = "info-item";
          
          let txtGrupo = document.createElement('div');
          txtGrupo.className = "texto-grupo";
          txtGrupo.textContent = item.grupo;
          
          let txtNombre = document.createElement('div');
          txtNombre.className = "texto-nombre";
          txtNombre.textContent = item.nombre;
          
          let txtPrecio = document.createElement('div');
          txtPrecio.className = "texto-precio";
          
          let valorPrecio = parseInt(item.precio, 10);
          let precioValido = !isNaN(valorPrecio) && valorPrecio > 0;
          if (precioValido) {
            txtPrecio.textContent = item.precio + " Bs."; // Formato compacto
          } else {
            txtPrecio.textContent = "Consultar";
          }
          
          // ENSAMBLAJE DUAL WHATSAPP
          let contWpp = document.createElement('div');
          contWpp.className = "contenedor-wpp-dual";
          
          let enlaceWpp1 = document.createElement('a');
          enlaceWpp1.className = "btn-wpp-sm";
          enlaceWpp1.href = Utilidades.crearEnlaceWpp(item.nombre, VECTORES_WPP.linea1);
          enlaceWpp1.target = "_blank";
          enlaceWpp1.innerHTML = '<i class="fab fa-whatsapp"></i> V1';
          
          let enlaceWpp2 = document.createElement('a');
          enlaceWpp2.className = "btn-wpp-sm";
          enlaceWpp2.href = Utilidades.crearEnlaceWpp(item.nombre, VECTORES_WPP.linea2);
          enlaceWpp2.target = "_blank";
          enlaceWpp2.innerHTML = '<i class="fab fa-whatsapp"></i> V2';
          
          contWpp.appendChild(enlaceWpp1);
          contWpp.appendChild(enlaceWpp2);
          
          infoContenedor.appendChild(txtGrupo);
          infoContenedor.appendChild(txtNombre);
          infoContenedor.appendChild(txtPrecio);
          infoContenedor.appendChild(contWpp);
          
          tarjeta.appendChild(imagen);
          tarjeta.appendChild(infoContenedor);
          nodoContenedor.appendChild(tarjeta);
          
          indiceVisual = indiceVisual + 1;
        }
        indiceElemento = indiceElemento + 1;
      }
    };

    MotorUI.abrirZoom = function(urlImagen) {
      let modal = MotorUI.referencias.modal;
      let imgAmpliada = MotorUI.referencias.imagenAmpliada;
      imgAmpliada.src = urlImagen;
      modal.classList.add('modal-activo');
    };

    MotorUI.cerrarZoom = function() {
      let modal = MotorUI.referencias.modal;
      modal.classList.remove('modal-activo');
    };

    // ======================================================================
    // 8_JAVASCRIPT_EVENT_LISTENERS CON ESCUDO DEBOUNCE
    // ======================================================================
    const MotorEventos = {};

    MotorEventos.escucharDOM = function() {
      let contenedorMatriz = MotorUI.referencias.matriz;
      let modalZoom = MotorUI.referencias.modal;
      let contenedorHUD = MotorUI.referencias.hud;
      let inputBuscador = MotorUI.referencias.buscador;
      
      let temporizadorBuscador = null;
      
      // DEBOUNCE: Escudo térmico para la RAM (0.3s)
      inputBuscador.addEventListener('input', function(evento) {
        clearTimeout(temporizadorBuscador);
        temporizadorBuscador = setTimeout(function() {
          EstadoAplicacion.textoBusqueda = evento.target.value;
          MotorUI.renderizarCatalogo();
        }, 300);
      });

      contenedorHUD.addEventListener('click', function(evento) {
        let elementoClickeado = evento.target;
        let esBotonFiltro = elementoClickeado.classList.contains('boton-filtro');
        
        if (esBotonFiltro) {
          let nuevaCategoria = elementoClickeado.dataset.categoria;
          EstadoAplicacion.filtroActivo = nuevaCategoria;
          
          MotorUI.renderizarHUD();
          MotorUI.renderizarCatalogo();
        }
      });
      
      contenedorMatriz.addEventListener('click', function(evento) {
        let elementoClickeado = evento.target;
        let esImagen = elementoClickeado.classList.contains('imagen-item');
        
        if (esImagen) {
          let url = elementoClickeado.dataset.url;
          MotorUI.abrirZoom(url);
        }
      });
      
      modalZoom.addEventListener('click', function(evento) {
        MotorUI.cerrarZoom();
      });
    };

    MotorEventos.sincronizarFirebase = function(db) {
      let coleccionFlores = db.collection("flores");
      
      coleccionFlores.onSnapshot(function(snapshot) {
        let arregloTemporal = [];
        let conjuntoCategorias = new Set();
        let documentos = snapshot.docs;
        let indice = 0;
        let totalDocumentos = documentos.length;
        
        while (indice < totalDocumentos) {
          let doc = documentos[indice];
          let datosCrudos = doc.data();
          let idDoc = doc.id;
          
          let nombreBase = datosCrudos.nombre;
          let datosDiseccionados = Utilidades.diseccionarNombre(nombreBase);
          
          let grupoAnalizado = datosDiseccionados.grupo;
          let nombreAnalizado = datosDiseccionados.nombre;
          
          conjuntoCategorias.add(grupoAnalizado);
          
          let objetoDominio = {};
          objetoDominio.id = idDoc;
          objetoDominio.grupo = grupoAnalizado;
          objetoDominio.nombre = nombreAnalizado;
          objetoDominio.img = datosCrudos.img || datosCrudos.direccion;
          objetoDominio.precio = datosCrudos.precio;
          
          arregloTemporal.push(objetoDominio);
          indice = indice + 1;
        }
        
        let arregloCategorias = Array.from(conjuntoCategorias);
        arregloCategorias.sort();
        
        EstadoAplicacion.datosProcesados = arregloTemporal;
        EstadoAplicacion.categoriasUnicas = arregloCategorias;
        
        MotorUI.renderizarHUD();
        MotorUI.renderizarCatalogo();
      });
    };

    // ======================================================================
    // 9_JAVASCRIPT_INICIALIZACION
    // ======================================================================
    function inicializarSistema() {
      let conexionActiva = MotorConexion.iniciar();
      MotorUI.mapearNodos();
      MotorEventos.escucharDOM();
      MotorEventos.sincronizarFirebase(conexionActiva);
    }

    document.addEventListener('DOMContentLoaded', inicializarSistema);
  </script>
</body>
</html>
