<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nivani | Boutique de Flores Artesanales</title>
  
  <!-- Tailwind CSS para diseño fluido y ultra responsivo -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Iconos FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Fuentes de Google: Playfair Display para títulos elegantes e Inter para UI -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,450&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Configuración de Tailwind Personalizada -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['"Playfair Display"', 'serif'],
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    :root {
      --color-fondo: #fdfcf8;
      --color-acento: #c5a8a0;
      --color-acento-hover: #b3948c;
      --color-texto: #1c1a19;
      --color-texto-sec: #706a66;
      --color-wpp: #16a34a;
      --color-wpp-fondo: #f0fdf4;
      --color-wpp-borde: #bbf7d0;
      --color-tarjeta: #ffffff;
      --color-recuadro: #faf9f5;
      --color-cristal: rgba(253, 252, 248, 0.85);
      --sombra-tarjeta: 0 10px 30px rgba(28, 26, 25, 0.03);
      --radio-borde: 24px;
      --radio-borde-hud: 20px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-fondo: #121110;
        --color-acento: #e5c8c0;
        --color-acento-hover: #f3dad3;
        --color-texto: #f5f3f2;
        --color-texto-sec: #9e9590;
        --color-wpp: #22c55e;
        --color-wpp-fondo: rgba(34, 197, 94, 0.08);
        --color-wpp-borde: rgba(34, 197, 94, 0.2);
        --color-tarjeta: #1c1a19;
        --color-recuadro: #262322;
        --color-cristal: rgba(18, 17, 16, 0.88);
        --sombra-tarjeta: 0 10px 30px rgba(0,0,0,0.25);
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: radial-gradient(circle at top center, var(--color-tarjeta) 0%, var(--color-fondo) 100%);
      background-attachment: fixed;
      color: var(--color-texto);
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .pantalla-arranque {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: var(--color-fondo); z-index: 99999;
      display: flex; justify-content: center; align-items: center;
      transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.8s;
    }
    .pantalla-oculta { opacity: 0; visibility: hidden; }
    
    .titulo-arranque {
      font-family: 'Inter', sans-serif; font-weight: 200; letter-spacing: 15px;
      font-size: 3rem; text-transform: uppercase; color: var(--color-texto);
      margin-right: -15px; animation: pulsoArranque 2.5s infinite ease-in-out;
    }
    @keyframes pulsoArranque {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.02); }
    }

    /* Scroll Personalizado de Lujo */
    .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scroll::-webkit-scrollbar-track { background: transparent; }
    .custom-scroll::-webkit-scrollbar-thumb {
      background-color: var(--color-acento);
      border-radius: 20px;
      opacity: 0.4;
    }

    /* Estilos del Cajón de Carrito (Slide Over) */
    .carrito-drawer {
      transform: translateX(100%);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .carrito-drawer.abierto {
      transform: translateX(0);
    }

    @keyframes pulsoCorazon {
      0% { box-shadow: 0 0 0 0 rgba(153, 27, 27, 0.4); }
      15% { box-shadow: 0 0 0 8px rgba(153, 27, 27, 0); }
      30% { box-shadow: 0 0 0 0 rgba(153, 27, 27, 0.4); }
      45% { box-shadow: 0 0 0 8px rgba(153, 27, 27, 0); }
      100% { box-shadow: 0 0 0 0 rgba(153, 27, 27, 0); }
    }
    @keyframes pulsoRespiracion {
      0% { box-shadow: 0 0 4px rgba(15, 118, 110, 0.2); }
      50% { box-shadow: 0 0 14px rgba(15, 118, 110, 0.5); }
      100% { box-shadow: 0 0 4px rgba(15, 118, 110, 0.2); }
    }
    .badge-luxury-nuevo { animation: pulsoRespiracion 3s infinite ease-in-out; }
    .badge-luxury-escaso { animation: pulsoCorazon 1.8s infinite; }

    /* Estilo del Toast elegante */
    .toast-container {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 100000;
      pointer-events: none;
    }
    .toast-notif {
      pointer-events: auto;
      transform: translateY(-20px);
      opacity: 0;
      transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .toast-notif.active {
      transform: translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body class="bg-[#fdfcf8] dark:bg-[#121110] transition-colors duration-300">

  <div id="pantalla-arranque" class="pantalla-arranque">
    <div class="text-center">
      <h1 class="titulo-arranque">NIVANI</h1>
      <p class="text-[0.65rem] tracking-[6px] text-stone-400 dark:text-stone-500 uppercase mt-2">Flores de Alta Costura</p>
    </div>
  </div>

  <!-- Alerta de Conexión Offline Sutil -->
  <div id="alerta-offline" class="fixed bottom-0 left-0 w-full bg-red-700 text-white text-center py-2 px-4 text-xs font-semibold tracking-wide transition-transform duration-300 translate-y-full z-[999]">
    <i class="fas fa-wifi mr-2"></i> Conexión débil o nula. Visualizando catálogo offline.
  </div>

  <div class="sticky top-0 z-40 bg-[var(--color-cristal)] backdrop-blur-md border-b border-stone-200/10 px-4 py-4 md:px-8 md:py-6 flex flex-col items-center flex-shrink-0">
    <!-- Logotipo Principal -->
    <h1 class="text-2xl md:text-4xl font-light tracking-[16px] text-[var(--color-texto)] uppercase mr-[-16px] mb-4 select-none cursor-default">NIVANI</h1>
    
    <div class="w-full max-w-6xl flex flex-col md:flex-row gap-4 items-center justify-between">
      <!-- Navegación y Filtros de Categorías -->
      <nav id="contenedor-hud" class="flex gap-2 overflow-x-auto w-full md:w-auto pb-1 md:pb-0 custom-scroll select-none"></nav>

      <!-- Buscador y Clasificador de Precios -->
      <div class="flex gap-2 w-full md:w-auto items-center flex-wrap sm:flex-nowrap">
        <!-- Buscador -->
        <div class="relative w-full sm:w-[240px]">
          <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-[var(--color-acento)] text-xs"></i>
          <input type="text" id="buscador-vivo" placeholder="Buscar flor artesanal..." 
                 class="w-full pl-10 pr-4 py-2 text-sm rounded-[var(--radio-borde-hud)] border border-stone-200/20 dark:border-stone-800/20 bg-[var(--color-recuadro)] text-[var(--color-texto)] outline-none focus:border-[var(--color-acento)] focus:ring-1 focus:ring-[var(--color-acento)]/30 transition-all duration-300">
        </div>

        <!-- Clasificador de precios -->
        <div class="relative w-full sm:w-[180px]">
          <i class="fas fa-sort absolute left-4 top-1/2 -translate-y-1/2 text-[var(--color-acento)] text-xs"></i>
          <select id="orden-precio" class="w-full pl-10 pr-8 py-2 text-sm rounded-[var(--radio-borde-hud)] border border-stone-200/20 dark:border-stone-800/20 bg-[var(--color-recuadro)] text-[var(--color-texto)] appearance-none outline-none focus:border-[var(--color-acento)] transition-all duration-300 cursor-pointer">
            <option value="default">Relevancia</option>
            <option value="asc">Precio: Bajo a Alto</option>
            <option value="desc">Precio: Alto a Bajo</option>
          </select>
          <i class="fas fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-[var(--color-acento)] text-[10px] pointer-events-none"></i>
        </div>

        <!-- Botón flotante para abrir el Carrito en móviles/desktops -->
        <button id="btn-abrir-carrito" class="relative min-h-[44px] min-w-[44px] bg-[var(--color-recuadro)] text-[var(--color-texto)] hover:bg-[var(--color-acento)] hover:text-white border border-stone-200/10 rounded-full flex items-center justify-center transition-all duration-300 shadow-sm">
          <i class="fas fa-shopping-bag text-base"></i>
          <span id="badge-carrito-contador" class="absolute -top-1 -right-1 bg-[var(--color-acento)] text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center scale-0 transition-transform duration-300">0</span>
        </button>
      </div>
    </div>
  </div>

  <main class="panel-catalogo flex-grow overflow-y-auto custom-scroll px-4 md:px-8 py-6" id="panel-scroll">
    <div id="contenedor-matriz" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-6 max-w-6xl mx-auto">
      <!-- Mensaje cuando no hay resultados -->
      <div id="estado-vacio" class="col-span-full hidden flex-col items-center justify-center py-20 text-center animate-fade-in">
        <i class="fas fa-seedling text-4xl text-[var(--color-acento)] opacity-50 mb-4"></i>
        <p class="text-lg text-[var(--color-texto)] font-medium mb-1">Sin coincidencias florales</p>
        <p class="text-sm text-[var(--color-texto-sec)] font-light max-w-sm">Intenta cambiando el filtro de categorías o ajustando la búsqueda.</p>
      </div>
    </div>
  </main>

  <!-- Botón de retorno al inicio -->
  <button id="btn-subir" class="fixed bottom-6 right-6 w-11 h-11 bg-[var(--color-texto)] text-[var(--color-fondo)] hover:opacity-90 rounded-full flex items-center justify-center shadow-lg cursor-pointer transform translate-y-10 opacity-0 pointer-events-none transition-all duration-300 z-30">
    <i class="fas fa-chevron-up"></i>
  </button>

  <div id="carrito-capa-oscura" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[1000] hidden opacity-0 transition-opacity duration-300"></div>
  <aside id="carrito-drawer" class="carrito-drawer fixed top-0 right-0 h-full w-full sm:w-[420px] bg-[var(--color-tarjeta)] border-l border-stone-200/10 shadow-2xl flex flex-col z-[1001]">
    <!-- Encabezado del cajón -->
    <div class="px-6 py-5 border-b border-stone-200/10 flex justify-between items-center bg-[var(--color-recuadro)]">
      <div class="flex items-center gap-3">
        <i class="fas fa-shopping-bag text-lg text-[var(--color-acento)]"></i>
        <div>
          <h2 class="font-serif italic text-lg font-semibold text-[var(--color-texto)]">Tu Pedido</h2>
          <p class="text-[10px] text-[var(--color-texto-sec)] tracking-wider uppercase">Memoria temporal del pedido</p>
        </div>
      </div>
      <button id="btn-cerrar-carrito" class="w-8 h-8 rounded-full bg-stone-200/10 flex items-center justify-center text-[var(--color-texto)] hover:bg-stone-200/30 transition-all">
        <i class="fas fa-times text-sm"></i>
      </button>
    </div>

    <!-- Lista de artículos en el carrito -->
    <div id="carrito-articulos" class="flex-grow overflow-y-auto px-6 py-4 custom-scroll space-y-4">
      <!-- El sistema inyectará aquí los items de manera reactiva -->
    </div>

    <!-- Contenedor del pie y cálculo total -->
    <div class="p-6 border-t border-stone-200/10 bg-[var(--color-recuadro)]">
      <div class="flex justify-between items-center mb-4">
        <span class="text-xs uppercase tracking-widest text-[var(--color-texto-sec)] font-semibold">Total Estimado</span>
        <span id="carrito-precio-total" class="font-bold text-xl text-[var(--color-texto)]">0 Bs.</span>
      </div>
      
      <!-- Selector de línea para WhatsApp -->
      <div class="mb-4">
        <label class="text-[10px] uppercase tracking-wider text-[var(--color-texto-sec)] font-bold block mb-1">Enviar pedido a:</label>
        <div class="grid grid-cols-2 gap-2">
          <label class="flex items-center gap-2 p-2 bg-[var(--color-tarjeta)] border border-stone-200/15 rounded-xl cursor-pointer">
            <input type="radio" name="wpp-linea-destino" value="linea1" checked class="accent-[var(--color-acento)]">
            <span class="text-xs font-semibold text-[var(--color-texto)]">Línea VIP 1</span>
          </label>
          <label class="flex items-center gap-2 p-2 bg-[var(--color-tarjeta)] border border-stone-200/15 rounded-xl cursor-pointer">
            <input type="radio" name="wpp-linea-destino" value="linea2" class="accent-[var(--color-acento)]">
            <span class="text-xs font-semibold text-[var(--color-texto)]">Línea VIP 2</span>
          </label>
        </div>
      </div>

      <!-- Botón unificado de finalización -->
      <button id="btn-enviar-pedido" class="w-full bg-[#16a34a] hover:bg-emerald-700 text-white py-3 px-4 rounded-xl font-semibold text-sm flex items-center justify-center gap-2 shadow-lg hover:shadow-xl transition-all duration-300">
        <i class="fab fa-whatsapp text-lg"></i> Enviar Pedido por WhatsApp
      </button>
    </div>
  </aside>

  <div id="zoom-modal" class="fixed inset-0 bg-black/95 z-[9999] hidden items-center justify-center opacity-0 transition-opacity duration-300 backdrop-blur-md">
    <button class="absolute top-6 right-6 text-white text-2xl hover:scale-110 transition-transform"><i class="fas fa-times"></i></button>
    <img id="imagen-ampliada" class="max-w-[90vw] max-h-[85vh] md:max-h-[90vh] object-contain rounded-2xl shadow-2xl scale-95 transition-transform duration-300" src="" alt="Ampliada">
  </div>

  <!-- Contenedor de notificaciones Toast -->
  <div id="toast-container" class="toast-container flex flex-col gap-2"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { initializeFirestore, persistentLocalCache, persistentMultipleTabManager, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const ConfiguracionFirebase = {
      apiKey: "AIzaSyBqsTxi2PoFjPgvre4QqZvWHczUoO5sqU8",
      projectId: "limpiapipas-98f13",
      appId: "1:456357010113:web:c10522df7cdb2dbea1d240"
    };

    const VECTORES_WPP = {
      linea1: "59178593187",
      linea2: "59177047557"
    };

    const EstadoAplicacion = {
      datosProcesados: [],
      categoriasUnicas: [],
      filtroActivo: "TODO",
      ordenPrecio: "default", // default | asc | desc
      textoBusqueda: "",
      primeraCarga: true,
      carrito: [], // Memoria temporal del Carrito de Pedidos
      favoritos: JSON.parse(localStorage.getItem('nivani_favoritos')) || [] // Sistema de favoritos por localStorage
    };

    // Instancia del observador perezoso para animaciones
    const ObserverAnimacion = new IntersectionObserver((entradas, observador) => {
      entradas.forEach(entrada => {
        if (entrada.isIntersecting) {
          entrada.target.classList.add('revelado', 'opacity-100', 'translate-y-0');
          observador.unobserve(entrada.target);
        }
      });
    }, { threshold: 0.05, rootMargin: "0px 0px -10px 0px" });

    const Utilidades = {
      quitarTildes: function(texto) {
        return (texto || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "");
      },
      vibrar: function() {
        if (navigator.vibrate) navigator.vibrate(15);
      },
      
      // Notificaciones Toast Flotantes para Feedback Inmediato
      mostrarToast: function(mensaje, tipo = "success") {
        const cont = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = "toast-notif bg-[var(--color-tarjeta)] border border-stone-200/10 text-[var(--color-texto)] px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 max-w-sm pointer-events-auto transition-all duration-300";
        
        let iconHtml = '<i class="fas fa-check-circle text-emerald-500"></i>';
        if (tipo === "heart") {
          iconHtml = '<i class="fas fa-heart text-red-500"></i>';
        } else if (tipo === "trash") {
          iconHtml = '<i class="fas fa-trash-alt text-amber-500"></i>';
        }
        
        toast.innerHTML = `
          ${iconHtml}
          <span class="text-xs font-semibold tracking-wide">${mensaje}</span>
        `;
        
        cont.appendChild(toast);
        setTimeout(() => toast.classList.add('active'), 50);
        
        // Auto eliminar después de 2.5 segundos
        setTimeout(() => {
          toast.classList.remove('active');
          toast.classList.add('translate-y-[-10px]', 'opacity-0');
          setTimeout(() => toast.remove(), 350);
        }, 2500);
      },

      // Alternar favoritos guardando en disco local del cliente
      toggleFavorito: function(id, nombre) {
        this.vibrar();
        const index = EstadoAplicacion.favoritos.indexOf(id);
        if (index === -1) {
          EstadoAplicacion.favoritos.push(id);
          this.mostrarToast(`"${nombre}" guardada en favoritos.`, "heart");
        } else {
          EstadoAplicacion.favoritos.splice(index, 1);
          this.mostrarToast(`"${nombre}" eliminada de favoritos.`, "trash");
        }
        localStorage.setItem('nivani_favoritos', JSON.stringify(EstadoAplicacion.favoritos));
        
        // Renderizado reactivo instantáneo para actualizar el corazón y las vistas de favoritos
        MotorUI.renderizarCatalogo();
      },

      // Compartir nativo del dispositivo móvil
      compartirNativo: async function(nombre) {
        if (navigator.share) {
          try {
            await navigator.share({
              title: 'Nivani | ' + nombre,
              text: `¡Mira esta hermosa flor artesanal de Nivani: ${nombre}!`,
              url: window.location.href
            });
          } catch (err) { console.log('Share cancelado', err); }
        }
      },

      // Canal de Consultas Individuales (WhatsApp VIP)
      crearEnlaceWpp: function(nombreFlor, precioItem, numeroAsignado) {
        let base = "https://wa.me/" + numeroAsignado + "?text=";
        let p = parseInt(precioItem, 10);
        let sec = (!isNaN(p) && p > 0) ? `. Vi que está en ${precioItem} Bs.` : ". Me gustaría cotizarla.";
        let upsell = " ¿Tienen opciones de tarjetas o chocolates para acompañarlo?";
        return base + encodeURIComponent(`Hola Nivani, me interesa la flor artesanal: ${nombreFlor}${sec}${upsell}`);
      },

      crearEnlaceCarritoWpp: function(carrito, numeroAsignado) {
        let base = "https://wa.me/" + numeroAsignado + "?text=";
        let listaText = "";
        let total = 0;

        carrito.forEach(item => {
          let p = parseInt(item.precio, 10);
          let subtotal = p * item.cantidad;
          total += subtotal;
          listaText += `• ${item.cantidad}x ${item.nombre} (${p} Bs. c/u) \n`;
        });

        let mensaje = `Hola Nivani, me gustaría realizar el siguiente pedido artesanal: \n\n${listaText}\n*Total Estimado: ${total} Bs.*\n\n¿Me confirman disponibilidad y tiempo de entrega?`;
        return base + encodeURIComponent(mensaje);
      },
      
      // Extractor inteligente: el guion medio (-) y el guion bajo (_) actúan igual
      diseccionarNombre: function(cadenaCruda) {
        let cadena = cadenaCruda || "";
        let res = { grupo: "GENERAL", nombre: cadena.trim(), badgeNuevo: false, badgeEscaso: false };
        
        // Buscamos el primer separador que sea '-' o '_'
        let matchSeparador = cadena.match(/[-_]/);
        let indiceSeparador = matchSeparador ? matchSeparador.index : -1;
        
        if (indiceSeparador !== -1) {
          res.grupo = cadena.substring(0, indiceSeparador).trim().toUpperCase();
          let nombrePuro = cadena.substring(indiceSeparador + 1).trim();
          res.badgeNuevo = nombrePuro.includes('+');
          res.badgeEscaso = nombrePuro.includes('*');
          res.nombre = nombrePuro.replace('+', '').replace('*', '').trim();
        } else {
          res.badgeNuevo = cadena.includes('+');
          res.badgeEscaso = cadena.includes('*');
          res.nombre = cadena.replace('+', '').replace('*', '').trim();
        }
        return res;
      }
    };

    const MotorConexion = {
      iniciar: async function() {
        try {
          const app = initializeApp(ConfiguracionFirebase);
          
          // Inicializamos Firestore directamente con persistencia en caché local
          const db = initializeFirestore(app, {
            localCache: persistentLocalCache({
              tabManager: persistentMultipleTabManager()
            })
          });
          
          return db;
        } catch (error) {
          console.error("Fallo de inicialización de Firebase:", error);
          // Visualizar alerta sutil de modo offline
          document.getElementById('alerta-offline').classList.remove('translate-y-full');
          return null;
        }
      }
    };

    const MotorUI = {
      referencias: {},
      mapearNodos: function() {
        this.referencias = {
          arranque: document.getElementById('pantalla-arranque'),
          offline: document.getElementById('alerta-offline'),
          matriz: document.getElementById('contenedor-matriz'),
          modal: document.getElementById('zoom-modal'),
          imagenAmpliada: document.getElementById('imagen-ampliada'),
          hud: document.getElementById('contenedor-hud'),
          buscador: document.getElementById('buscador-vivo'),
          ordenador: document.getElementById('orden-precio'),
          estadoVacio: document.getElementById('estado-vacio'),
          panelScroll: document.getElementById('panel-scroll'),
          btnSubir: document.getElementById('btn-subir'),
          
          // Nodos del Carrito de Pedidos
          btnAbrirCarrito: document.getElementById('btn-abrir-carrito'),
          btnCerrarCarrito: document.getElementById('btn-cerrar-carrito'),
          carritoCapaOscura: document.getElementById('carrito-capa-oscura'),
          carritoDrawer: document.getElementById('carrito-drawer'),
          carritoArticulos: document.getElementById('carrito-articulos'),
          carritoPrecioTotal: document.getElementById('carrito-precio-total'),
          btnEnviarPedido: document.getElementById('btn-enviar-pedido'),
          badgeContador: document.getElementById('badge-carrito-contador')
        };
      },

      // Renderizador de los botones del HUD superior
      renderizarHUD: function() {
        let cont = this.referencias.hud;
        cont.innerHTML = "";
        
        let arrFiltros = [{ id: "TODO", texto: "Todo", icono: "fa-layer-group" }];
        
        // Inyectamos la opción de Favoritos personalizada
        arrFiltros.push({ id: "FAV", texto: "Mis Favoritos", icono: "fa-heart text-red-500" });

        EstadoAplicacion.categoriasUnicas.forEach(cat => {
          if (cat !== "GENERAL" && cat !== "") {
            arrFiltros.push({ id: cat, texto: cat, icono: "fa-seedling" });
          }
        });

        arrFiltros.forEach(f => {
          let btn = document.createElement('button');
          btn.className = "boton-filtro px-4 py-2 rounded-[var(--radio-borde-hud)] border text-xs font-semibold uppercase tracking-wider flex items-center gap-2 transition-all duration-300 cursor-pointer flex-shrink-0 " + 
            (EstadoAplicacion.filtroActivo === f.id 
              ? "bg-[var(--color-acento)] border-[var(--color-acento)] text-white shadow-md shadow-[var(--color-acento)]/25" 
              : "bg-[var(--color-recuadro)] border-stone-200/20 text-[var(--color-acento)] hover:bg-[var(--color-acento)]/10");
          
          btn.innerHTML = `<i class="fas ${f.icono}"></i> ${f.texto}`;
          btn.dataset.categoria = f.id;
          cont.appendChild(btn);
        });
      },

      renderizarCatalogo: function() {
        let contenedor = this.referencias.matriz;
        let tarjetasPrevias = contenedor.querySelectorAll('.tarjeta-item');
        tarjetasPrevias.forEach(n => { ObserverAnimacion.unobserve(n); n.remove(); });
        
        let filtroCat = EstadoAplicacion.filtroActivo;
        let busqueda = Utilidades.quitarTildes(EstadoAplicacion.textoBusqueda).toUpperCase();
        
        // Creamos una copia de trabajo de la matriz para no alterar la persistencia
        let itemsProcesar = [...EstadoAplicacion.datosProcesados];

        // Lógica de Ordenación de Precios
        if (EstadoAplicacion.ordenPrecio === "asc") {
          itemsProcesar.sort((a, b) => {
            let pA = parseInt(a.precio, 10) || 0;
            let pB = parseInt(b.precio, 10) || 0;
            return pA - pB;
          });
        } else if (EstadoAplicacion.ordenPrecio === "desc") {
          itemsProcesar.sort((a, b) => {
            let pA = parseInt(a.precio, 10) || 0;
            let pB = parseInt(b.precio, 10) || 0;
            return pB - pA;
          });
        }

        let contadorVisual = 0;
        
        itemsProcesar.forEach((item) => {
          let pasaFiltro = false;
          let pVal = parseInt(item.precio, 10);
          
          if (filtroCat === "TODO") {
            pasaFiltro = true;
          } else if (filtroCat === "FAV") {
            pasaFiltro = EstadoAplicacion.favoritos.includes(item.id);
          } else {
            pasaFiltro = (item.grupo === filtroCat);
          }

          let pasaTex = Utilidades.quitarTildes(item.nombre).toUpperCase().includes(busqueda);
          
          if (pasaFiltro && pasaTex) {
            let tarjeta = document.createElement('div');
            tarjeta.className = "tarjeta-item bg-[var(--color-tarjeta)] rounded-[var(--radio-borde)] p-2 shadow-sm transition-all duration-300 flex flex-col justify-between relative border border-stone-200/5 hover:-translate-y-1 hover:shadow-lg opacity-0 translate-y-6";
            
            // Contenedor de Imagen y Badges
            let contImg = document.createElement('div');
            contImg.className = "contenedor-imagen relative w-full h-44 rounded-2xl overflow-hidden bg-[var(--color-recuadro)] flex-shrink-0";

            let img = document.createElement('img');
            img.className = "imagen-item w-full h-full object-cover cursor-zoom-in opacity-0 transition-opacity duration-500 hover:scale-105 duration-500";
            img.src = item.img || "https://placehold.co/400x400/fdfcf8/c5a8a0?text=Nivani";
            img.dataset.url = img.src;
            
            // Control de errores al cargar imagen (Placeholder elegante)
            img.onerror = function() {
              this.src = "https://placehold.co/400x400/fdfcf8/c5a8a0?text=Nivani+Flor";
            };

            img.onload = function() {
              img.classList.remove('opacity-0');
              img.classList.add('opacity-100');
            };
            contImg.appendChild(img);

            // Badges Exclusivos
            if (item.badgeNuevo) {
              let b = document.createElement('div');
              b.className = "badge-luxury badge-luxury-nuevo absolute bottom-3 left-3 px-3 py-1 bg-teal-50/95 dark:bg-teal-950/90 text-teal-700 dark:text-teal-300 text-[9px] font-bold tracking-wider rounded-full border border-teal-200/10";
              b.innerHTML = '✦ Nueva'; contImg.appendChild(b);
            }
            if (item.badgeEscaso) {
              let b = document.createElement('div');
              b.className = "badge-luxury badge-luxury-escaso absolute bottom-3 left-3 px-3 py-1 bg-red-50/95 dark:bg-red-950/90 text-red-700 dark:text-red-300 text-[9px] font-bold tracking-wider rounded-full border border-red-200/10";
              b.innerHTML = '🔴 Limitada'; contImg.appendChild(b);
            }

            let esFav = EstadoAplicacion.favoritos.includes(item.id);
            let btnFav = document.createElement('button');
            btnFav.className = `btn-favorito absolute top-3 right-3 w-8 h-8 rounded-full flex items-center justify-center transition-all duration-300 shadow-md ${esFav ? 'bg-red-50 text-red-500 scale-105' : 'bg-white/80 dark:bg-black/60 text-stone-500 dark:text-stone-400 hover:text-red-500 hover:scale-110'}`;
            btnFav.innerHTML = `<i class="${esFav ? 'fas' : 'far'} fa-heart text-xs"></i>`;
            btnFav.addEventListener('click', (e) => {
              e.stopPropagation();
              Utilidades.toggleFavorito(item.id, item.nombre);
            });
            contImg.appendChild(btnFav);

            tarjeta.appendChild(contImg);
            
            // Recuadro de Info e Integración
            let recuadro = document.createElement('div');
            recuadro.className = "recuadro-info bg-[var(--color-recuadro)] border border-stone-200/5 rounded-2xl p-3 mt-2 flex flex-col justify-between flex-grow";
            
            let valNum = parseInt(item.precio, 10);
            let pTxt = (!isNaN(valNum) && valNum > 0) ? `${item.precio} Bs.` : "Consultar";

            recuadro.innerHTML = `
              <div class="flex justify-between items-center mb-1">
                <span class="text-[9px] font-bold text-[var(--color-acento)] tracking-widest uppercase">${item.grupo}</span>
                <button class="btn-share text-stone-400 hover:text-[var(--color-acento)] transition-colors text-xs p-1" data-nombre="${item.nombre}" title="Sugerir como Regalo"><i class="fas fa-gift"></i></button>
              </div>
              <h3 class="font-serif italic font-medium text-sm text-[var(--color-texto)] line-clamp-1 flex-grow mb-1">${item.nombre}</h3>
              <div class="font-bold text-sm text-[var(--color-texto)] mb-2">${pTxt}</div>
              
              <!-- Botón Añadir al Pedido (Carrito de pedidos) -->
              <button class="btn-add-pedido w-full bg-[var(--color-texto)] text-[var(--color-fondo)] hover:opacity-90 py-1.5 rounded-xl text-xs font-semibold tracking-wider flex items-center justify-center gap-2 mb-2 transition-transform active:scale-95">
                <i class="fas fa-shopping-bag text-[10px]"></i> Añadir al Pedido
              </button>

              <div class="grid grid-cols-2 gap-1">
                <a href="${Utilidades.crearEnlaceWpp(item.nombre, item.precio, VECTORES_WPP.linea1)}" class="btn-wpp-sm text-[10px] font-bold text-center py-1 rounded-lg border border-stone-200/10 text-stone-600 dark:text-stone-300 bg-stone-100/10 hover:bg-stone-100/30 transition-all flex items-center justify-center gap-1" target="_blank"><i class="fab fa-whatsapp"></i> VIP 1</a>
                <a href="${Utilidades.crearEnlaceWpp(item.nombre, item.precio, VECTORES_WPP.linea2)}" class="btn-wpp-sm text-[10px] font-bold text-center py-1 rounded-lg border border-stone-200/10 text-stone-600 dark:text-stone-300 bg-stone-100/10 hover:bg-stone-100/30 transition-all flex items-center justify-center gap-1" target="_blank"><i class="fab fa-whatsapp"></i> VIP 2</a>
              </div>
            `;
            
            // Asignación de Eventos Internos
            recuadro.querySelector('.btn-share').addEventListener('click', function(e) {
              e.stopPropagation();
              Utilidades.vibrar(); Utilidades.compartirNativo(this.dataset.nombre);
            });

            recuadro.querySelector('.btn-add-pedido').addEventListener('click', function(e) {
              e.stopPropagation();
              MotorUI.agregarAlCarrito(item);
            });

            tarjeta.appendChild(recuadro);
            contenedor.appendChild(tarjeta);
            ObserverAnimacion.observe(tarjeta); 
            contadorVisual++;
          }
        });
        
        this.referencias.estadoVacio.style.display = (contadorVisual === 0) ? "flex" : "none";

        if (EstadoAplicacion.primeraCarga) {
          setTimeout(() => {
            if(this.referencias.arranque) this.referencias.arranque.classList.add('pantalla-oculta');
          }, 600);
          EstadoAplicacion.primeraCarga = false;
        }
      },

      agregarAlCarrito: function(item) {
        Utilidades.vibrar();
        const itemExistente = EstadoAplicacion.carrito.find(c => c.id === item.id);
        
        if (itemExistente) {
          itemExistente.cantidad += 1;
        } else {
          EstadoAplicacion.carrito.push({
            id: item.id,
            nombre: item.nombre,
            precio: item.precio,
            img: item.img,
            cantidad: 1
          });
        }
        
        Utilidades.mostrarToast(`"${item.nombre}" añadida al pedido.`);
        this.actualizarReactivoCarrito();
      },

      ajustarCantidadCarrito: function(id, cambio) {
        Utilidades.vibrar();
        const index = EstadoAplicacion.carrito.findIndex(c => c.id === id);
        if (index === -1) return;

        EstadoAplicacion.carrito[index].cantidad += cambio;

        if (EstadoAplicacion.carrito[index].cantidad <= 0) {
          const borrado = EstadoAplicacion.carrito.splice(index, 1);
          Utilidades.mostrarToast(`"${borrado[0].nombre}" eliminada del carrito.`, "trash");
        }

        this.actualizarReactivoCarrito();
      },

      actualizarReactivoCarrito: function() {
        let total = 0;
        let totalArticulos = 0;
        let contenedor = this.referencias.carritoArticulos;
        contenedor.innerHTML = "";

        if (EstadoAplicacion.carrito.length === 0) {
          contenedor.innerHTML = `
            <div class="flex flex-col items-center justify-center py-16 text-center">
              <i class="fas fa-shopping-bag text-3xl text-stone-300 dark:text-stone-700 mb-2"></i>
              <p class="text-sm text-[var(--color-texto-sec)] font-light">Tu pedido temporal está vacío</p>
            </div>
          `;
          this.referencias.badgeContador.classList.add('scale-0');
          this.referencias.badgeContador.classList.remove('scale-100');
        } else {
          EstadoAplicacion.carrito.forEach(item => {
            let p = parseInt(item.precio, 10) || 0;
            let subtotal = p * item.cantidad;
            total += subtotal;
            totalArticulos += item.cantidad;

            let row = document.createElement('div');
            row.className = "flex items-center gap-3 p-2 bg-[var(--color-recuadro)] border border-stone-200/5 rounded-xl animate-fade-in";
            row.innerHTML = `
              <img src="${item.img}" class="w-12 h-12 rounded-lg object-cover bg-stone-200/20" onerror="this.src='https://placehold.co/400x400/fdfcf8/c5a8a0?text=Flor'">
              <div class="flex-grow">
                <h4 class="font-serif italic text-xs text-[var(--color-texto)] font-semibold line-clamp-1">${item.nombre}</h4>
                <p class="text-[10px] text-[var(--color-texto-sec)]">${p} Bs. c/u</p>
              </div>
              <div class="flex items-center gap-2">
                <button class="btn-menos w-6 h-6 rounded-full bg-[var(--color-tarjeta)] flex items-center justify-center border border-stone-200/10 text-[var(--color-texto)] hover:bg-stone-300/20" data-id="${item.id}">-</button>
                <span class="text-xs font-bold text-[var(--color-texto)]">${item.cantidad}</span>
                <button class="btn-mas w-6 h-6 rounded-full bg-[var(--color-tarjeta)] flex items-center justify-center border border-stone-200/10 text-[var(--color-texto)] hover:bg-stone-300/20" data-id="${item.id}">+</button>
              </div>
            `;

            row.querySelector('.btn-menos').addEventListener('click', () => this.ajustarCantidadCarrito(item.id, -1));
            row.querySelector('.btn-mas').addEventListener('click', () => this.ajustarCantidadCarrito(item.id, 1));
            
            contenedor.appendChild(row);
          });

          // Animamos y actualizamos el globo indicador de items del Carrito
          this.referencias.badgeContador.innerText = totalArticulos;
          this.referencias.badgeContador.classList.remove('scale-0');
          this.referencias.badgeContador.classList.add('scale-100');
        }

        this.referencias.carritoPrecioTotal.innerText = `${total} Bs.`;
      },

      abrirZoom: function(url) {
        Utilidades.vibrar(); 
        this.referencias.imagenAmpliada.src = url;
        this.referencias.modal.classList.remove('hidden');
        this.referencias.modal.classList.add('flex');
        setTimeout(() => {
          this.referencias.modal.classList.add('opacity-100');
          this.referencias.imagenAmpliada.classList.add('scale-100');
        }, 50);
      },

      cerrarZoom: function() { 
        this.referencias.modal.classList.remove('opacity-100');
        this.referencias.imagenAmpliada.classList.remove('scale-100');
        setTimeout(() => {
          this.referencias.modal.classList.add('hidden');
          this.referencias.modal.classList.remove('flex');
        }, 300);
      },

      abrirCarritoDrawer: function() {
        this.referencias.carritoCapaOscura.classList.remove('hidden');
        setTimeout(() => {
          this.referencias.carritoCapaOscura.classList.remove('opacity-0');
          this.referencias.carritoCapaOscura.classList.add('opacity-100');
          this.referencias.carritoDrawer.classList.add('abierto');
        }, 20);
      },

      cerrarCarritoDrawer: function() {
        this.referencias.carritoDrawer.classList.remove('abierto');
        this.referencias.carritoCapaOscura.classList.remove('opacity-100');
        this.referencias.carritoCapaOscura.classList.add('opacity-0');
        setTimeout(() => {
          this.referencias.carritoCapaOscura.classList.add('hidden');
        }, 300);
      }
    };

    const MotorEventos = {
      escucharDOM: function() {
        let r = MotorUI.referencias; 
        let timer = null;
        
        // Entrada del Buscador reactivo con control de demora (Debounce)
        r.buscador.addEventListener('input', e => {
          clearTimeout(timer);
          timer = setTimeout(() => {
            EstadoAplicacion.textoBusqueda = e.target.value; 
            MotorUI.renderizarCatalogo();
          }, 250);
        });

        // Clasificador de orden de precio reactivo
        r.ordenador.addEventListener('change', e => {
          EstadoAplicacion.ordenPrecio = e.target.value;
          MotorUI.renderizarCatalogo();
        });

        // Click en el HUD de categorías
        r.hud.addEventListener('click', e => {
          let target = e.target.closest('.boton-filtro');
          if (target) {
            Utilidades.vibrar(); 
            EstadoAplicacion.filtroActivo = target.dataset.categoria;
            MotorUI.renderizarHUD(); 
            MotorUI.renderizarCatalogo();
          }
        });
        
        // Evento Delegado en Catálogo para zoom de imágenes
        r.matriz.addEventListener('click', e => {
          if (e.target.classList.contains('imagen-item')) {
            MotorUI.abrirZoom(e.target.dataset.url);
          }
        });
        
        r.modal.addEventListener('click', () => MotorUI.cerrarZoom());

        // Controladores de apertura y cierre de Carrito Drawer
        r.btnAbrirCarrito.addEventListener('click', () => MotorUI.abrirCarritoDrawer());
        r.btnCerrarCarrito.addEventListener('click', () => MotorUI.cerrarCarritoDrawer());
        r.carritoCapaOscura.addEventListener('click', () => MotorUI.cerrarCarritoDrawer());

        // Gestión de Scroll y flecha superior
        r.panelScroll.addEventListener('scroll', () => {
          if (r.panelScroll.scrollTop > 300) {
            r.btnSubir.classList.remove('opacity-0', 'translate-y-10', 'pointer-events-none');
            r.btnSubir.classList.add('opacity-100', 'translate-y-0', 'pointer-events-auto');
          } else {
            r.btnSubir.classList.remove('opacity-100', 'translate-y-0', 'pointer-events-auto');
            r.btnSubir.classList.add('opacity-0', 'translate-y-10', 'pointer-events-none');
          }
        });
        r.btnSubir.addEventListener('click', () => {
          Utilidades.vibrar(); 
          r.panelScroll.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Evento de checkout unificado del pedido
        r.btnEnviarPedido.addEventListener('click', () => {
          if (EstadoAplicacion.carrito.length === 0) {
            Utilidades.mostrarToast("No hay elementos para enviar.", "trash");
            return;
          }
          Utilidades.vibrar();
          
          // Captura de línea seleccionada
          const lineaSeleccionada = document.querySelector('input[name="wpp-linea-destino"]:checked').value;
          const numeroWpp = VECTORES_WPP[lineaSeleccionada] || VECTORES_WPP.linea1;
          
          const link = Utilidades.crearEnlaceCarritoWpp(EstadoAplicacion.carrito, numeroWpp);
          window.open(link, '_blank');
        });

        // Escuchadores de estado de conectividad de Red
        window.addEventListener('offline', () => r.offline.classList.remove('translate-y-full'));
        window.addEventListener('online', () => r.offline.classList.add('translate-y-full'));
      },

      // Sincronización en tiempo real de Firestore con control de fallos
      sincronizarFirebase: function(db) {
        if (!db) return;
        
        const coleccion = collection(db, "flores");
        
        onSnapshot(coleccion, (snapshot) => {
          let arr = []; 
          let cats = new Set();
          
          snapshot.docs.forEach(doc => {
            let d = doc.data();
            let p = Utilidades.diseccionarNombre(d.nombre);
            cats.add(p.grupo);
            
            arr.push({
              id: doc.id, 
              grupo: p.grupo, 
              nombre: p.nombre,
              badgeNuevo: p.badgeNuevo, 
              badgeEscaso: p.badgeEscaso,
              img: d.img || d.direccion || "", 
              precio: d.precio
            });
          });
          
          EstadoAplicacion.datosProcesados = arr;
          EstadoAplicacion.categoriasUnicas = Array.from(cats).sort();
          
          MotorUI.renderizarHUD();
          MotorUI.renderizarCatalogo();
          MotorUI.actualizarReactivoCarrito();
        }, (error) => {
          console.error("Fallo de sincronización en tiempo real:", error);
          Utilidades.mostrarToast("Fallo al conectar con el servidor. Modo Offline.", "trash");
        });
      }
    };

    document.addEventListener('DOMContentLoaded', async () => {
      // 1. Mapeamos nodos e iniciamos controladores de interacción de UI
      MotorUI.mapearNodos();
      MotorEventos.escucharDOM();
      
      // 2. Conexión de base de datos asíncrona
      let db = await MotorConexion.iniciar();
      
      // 3. Sincronización activa
      MotorEventos.sincronizarFirebase(db);
      
      // Verificación de redundancia offline inmediata
      if (!navigator.onLine) {
        MotorUI.referencias.offline.classList.remove('translate-y-full');
      }
    });
  </script>
</body>
</html>
