<!DOCTYPE html>
<html lang="es">
<head>
  <!-- SEÑOR DE LA VIDA® - V11.5 | OPTIMIZACIÓN EXTREMA iOS / NO-SCROLL -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
  <title>Nivani | Atelier de Flores en Chenilla</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  
  <style>
    :root {
      /* PALETA DE ATELIER MODO CLARO */
      --color-fondo: #fbfaf5;
      --color-acento: #c5a8a0;
      --color-acento-claro: rgba(197, 168, 160, 0.15);
      --color-texto: #201e1d;
      --color-texto-sec: #79716e;
      --color-wpp: #15803d;
      --color-wpp-fondo: #f0fdf4;
      --color-wpp-borde: #dcfce7;
      --color-tarjeta: #ffffff;
      --color-recuadro: #fdfdfb;
      --color-cristal: rgba(251, 250, 245, 0.85);
      --color-bisel-brillo: rgba(255, 255, 255, 0.9);
      --color-bisel-sombra: rgba(197, 168, 160, 0.25);
      
      --sombra-tactil: 
        inset 0 1px 0 var(--color-bisel-brillo), 
        inset 0 -1px 2px var(--color-bisel-sombra),
        0 4px 12px rgba(32, 30, 29, 0.03),
        0 1px 3px rgba(32, 30, 29, 0.02);
      
      --sombra-hover: 
        inset 0 1px 0 var(--color-bisel-brillo), 
        inset 0 -1px 2px var(--color-bisel-sombra),
        0 20px 35px rgba(197, 168, 160, 0.25),
        0 4px 10px rgba(32, 30, 29, 0.04);

      --radio-borde: 28px;
      --radio-borde-hud: 24px;
      --fuente-ui: 'Inter', sans-serif;
      --fuente-lujo: 'Playfair Display', serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        /* PALETA DE ATELIER MODO OSCURO */
        --color-fondo: #0f0e0e;
        --color-acento: #e5c8c0;
        --color-acento-claro: rgba(229, 200, 192, 0.12);
        --color-texto: #f3f1f0;
        --color-texto-sec: #a09793;
        --color-wpp: #22c55e;
        --color-wpp-fondo: rgba(34, 197, 94, 0.08);
        --color-wpp-borde: rgba(34, 197, 94, 0.15);
        --color-tarjeta: #171615;
        --color-recuadro: #1e1d1c;
        --color-cristal: rgba(15, 14, 14, 0.85);
        --color-bisel-brillo: rgba(255, 255, 255, 0.08);
        --color-bisel-sombra: rgba(0, 0, 0, 0.6);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: radial-gradient(circle at top center, var(--color-tarjeta) 0%, var(--color-fondo) 100%);
      background-attachment: fixed;
      color: var(--color-texto);
      font-family: var(--fuente-ui);
      width: 100%; height: 100vh;
      overflow-x: hidden; overflow-y: hidden; display: flex; flex-direction: column;
    }

    /* Scrollbars elegantes iOS style */
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(197, 168, 160, 0.4); border-radius: 10px; }

    .pantalla-arranque {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: var(--color-fondo); z-index: 99999;
      display: flex; justify-content: center; align-items: center;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    .pantalla-oculta { opacity: 0; visibility: hidden; }
    
    .titulo-arranque {
      font-family: var(--fuente-ui); font-weight: 200; letter-spacing: 15px;
      font-size: 3rem; text-transform: uppercase; color: var(--color-texto);
      margin-right: -15px; animation: pulsoArranque 2.5s infinite ease-in-out;
    }
    @keyframes pulsoArranque {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.02); }
    }

    .alerta-offline {
      position: fixed; bottom: env(safe-area-inset-bottom); left: 0; width: 100%;
      background: #b91c1c; color: white; text-align: center;
      padding: 10px; font-size: 0.85rem; font-weight: 600;
      transform: translateY(100%); transition: transform 0.4s ease; z-index: 999;
    }
    .alerta-offline.visible { transform: translateY(0); }

    .interfaz-fija {
      position: sticky; top: 0; z-index: 100;
      background-color: var(--color-cristal);
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      border-bottom: 1px solid rgba(197, 168, 160, 0.1);
      padding: calc(18px + env(safe-area-inset-top)) 25px 18px 25px;
      display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
    }

    .titulo-marca {
      font-family: var(--fuente-ui); font-weight: 200; letter-spacing: 12px;
      font-size: 2rem; text-transform: uppercase;
      color: var(--color-texto); text-shadow: 0 2px 10px rgba(0,0,0,0.02); margin-right: -12px;
    }

    .bloque-buscador { position: relative; width: 100%; max-width: 260px; }
    .bloque-buscador input {
      width: 100%; padding: 10px 15px 10px 38px; border-radius: var(--radio-borde-hud);
      border: 1px solid rgba(197, 168, 160, 0.25); background-color: var(--color-recuadro);
      color: var(--color-texto); font-size: 16px; 
      outline: none; transition: all 0.3s ease;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);
    }
    .bloque-buscador input:focus { border-color: var(--color-acento); box-shadow: 0 4px 15px rgba(197, 168, 160, 0.1); }
    .bloque-buscador i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--color-acento); font-size: 0.85rem; }

    .dock-flotante-wrapper {
      position: fixed; bottom: calc(25px + env(safe-area-inset-bottom)); 
      left: 50%; transform: translateX(-50%) translateY(0);
      z-index: 400; width: 90%; max-width: 600px;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2), opacity 0.4s ease;
    }
    .dock-flotante-wrapper.dock-oculto {
      transform: translateX(-50%) translateY(110px);
      opacity: 0;
    }

    .dock-flotante {
      background-color: var(--color-cristal);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(197, 168, 160, 0.18);
      border-radius: var(--radio-borde-hud);
      padding: 10px 12px;
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12), inset 0 1px 0 rgba(255,255,255,0.4);
      gap: 10px;
    }

    .contenedor-hud { display: flex; gap: 6px; overflow-x: auto; flex-grow: 1; scrollbar-width: none; }
    .contenedor-hud::-webkit-scrollbar { display: none; }

    .boton-filtro {
      padding: 8px 14px; border-radius: 18px;
      border: 1px solid transparent; background-color: transparent;
      color: var(--color-texto-sec); font-weight: 500; font-size: 0.75rem;
      cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.15);
      text-transform: uppercase; display: flex; align-items: center; gap: 6px; white-space: nowrap;
    }
    .boton-filtro:hover { background-color: var(--color-acento-claro); color: var(--color-acento); }
    .filtro-activo { 
      background-color: var(--color-acento) !important; 
      color: var(--color-fondo) !important; 
      box-shadow: 0 4px 15px rgba(197, 168, 160, 0.25);
    }

    .btn-bolsa-abrir {
      background-color: var(--color-texto);
      color: var(--color-fondo);
      border-radius: 18px;
      padding: 8px 14px;
      display: flex; align-items: center; gap: 8px;
      font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.15);
      cursor: pointer; border: none; flex-shrink: 0;
    }
    .btn-bolsa-abrir:hover { opacity: 0.9; transform: scale(1.02); }

    .panel-catalogo { 
      flex-grow: 1; overflow-y: auto; 
      padding: 25px 20px calc(110px + env(safe-area-inset-bottom)) 20px; 
      scroll-behavior: smooth; 
    }
    .panel-catalogo::-webkit-scrollbar { width: 5px; }
    .panel-catalogo::-webkit-scrollbar-thumb { background-color: rgba(197, 168, 160, 0.3); border-radius: 5px; }

    .matriz-simetrica {
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
      gap: 15px; max-width: 1200px; margin: 0 auto; position: relative;
    }

    .estado-vacio {
      grid-column: 1 / -1; text-align: center; padding: 60px 20px;
      display: none; flex-direction: column; align-items: center; animation: fadeIn 0.5s ease-out;
    }
    .estado-vacio i { font-size: 3rem; color: var(--color-acento); opacity: 0.5; margin-bottom: 15px; }
    .estado-vacio p { font-size: 1.1rem; color: var(--color-texto-sec); font-weight: 300; }

    .tarjeta-item {
      background-color: var(--color-tarjeta); 
      border-radius: var(--radio-borde); 
      padding: 10px;
      border: 1px solid rgba(197, 168, 160, 0.15);
      box-shadow: var(--sombra-tactil);
      transition: transform 0.5s cubic-bezier(0.15, 0.85, 0.35, 1.1), box-shadow 0.5s ease;
      display: flex; flex-direction: column; position: relative;
      content-visibility: auto; contain-intrinsic-size: 360px;
      opacity: 0; transform: translateY(30px);
      perspective: 1000px;
    }
    .tarjeta-item.revelado { opacity: 1; transform: translateY(0); }
    
    .tarjeta-item:hover { 
      transform: perspective(1000px) rotateX(2.5deg) rotateY(1deg) translateY(-4px); 
      box-shadow: var(--sombra-hover); 
    }

    .contenedor-imagen {
      position: relative; width: 100%; height: 160px; border-radius: 20px; overflow: hidden;
      background-color: var(--color-recuadro);
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.03);
    }
    
    .cargador-atelier {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      gap: 10px; background-color: var(--color-recuadro); z-index: 5;
    }
    .icono-huella-pulso {
      font-size: 2rem; color: var(--color-acento);
      animation: pulsoRespiracion 2s infinite ease-in-out;
    }
    .texto-espera-narrativo {
      font-size: 0.58rem; text-transform: uppercase; letter-spacing: 1.2px;
      font-weight: 600; color: var(--color-texto-sec); text-align: center;
      padding: 0 12px; line-height: 1.4;
    }

    .imagen-item {
      width: 100%; height: 100%; object-fit: cover; cursor: zoom-in;
      opacity: 0; transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .imagen-cargada { opacity: 1; }
    .tarjeta-item:hover .imagen-cargada { transform: scale(1.05); }

    .badge-luxury {
      position: absolute; bottom: 8px; right: 8px; padding: 5px 12px;
      border-radius: 20px; font-size: 0.6rem; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; z-index: 10; backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px); display: flex; align-items: center; gap: 5px;
    }
    .badge-luxury-nuevo { background: rgba(240, 253, 244, 0.85); color: #0f766e; border: 1px solid rgba(15, 118, 110, 0.15); }
    .badge-luxury-escaso { background: rgba(254, 242, 242, 0.85); color: #991b1b; border: 1px solid rgba(153, 27, 27, 0.15); animation: pulsoCorazon 2s infinite; }

    .recuadro-info {
      background: var(--color-recuadro); 
      border: 1px solid rgba(197, 168, 160, 0.08); 
      border-radius: 20px;
      padding: 12px; margin-top: 10px; display: flex; flex-direction: column; flex-grow: 1; gap: 6px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
    }
    
    .cabecera-info { display: flex; justify-content: space-between; align-items: center; }
    .texto-grupo { font-size: 0.55rem; color: var(--color-acento); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }
    
    .tiempo-elaboracion {
      font-size: 0.58rem; color: var(--color-texto-sec); font-weight: 500;
      display: flex; align-items: center; gap: 4px; opacity: 0.8; margin-top: -2px;
    }

    .btn-share { background: transparent; border: none; color: var(--color-texto-sec); cursor: pointer; transition: color 0.2s; font-size: 0.85rem; }
    .btn-share:hover { color: var(--color-acento); transform: scale(1.1); }

    .texto-nombre {
      font-family: var(--fuente-lujo); font-weight: 400; font-size: 0.85rem;
      color: var(--color-texto); line-height: 1.2; font-style: italic;
      letter-spacing: 0.3px; opacity: 0.95;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      display: block; width: 100%;
    }

    .btn-agregar-carrito { margin-top: auto; }

    .btn-subir {
      position: fixed; bottom: calc(95px + env(safe-area-inset-bottom)); 
      right: 25px; background-color: var(--color-texto);
      color: var(--color-fondo); width: 45px; height: 45px; border-radius: 50%;
      border: none; display: flex; justify-content: center; align-items: center;
      font-size: 1.1rem; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.15);
      opacity: 0; transform: translateY(20px); transition: all 0.3s; z-index: 390; pointer-events: none;
    }
    .btn-subir.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }

    .modal-zoom {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.95);
      display: none; justify-content: center; align-items: center; z-index: 9999;
      backdrop-filter: blur(15px); opacity: 0; transition: opacity 0.3s ease;
    }
    .modal-activo { display: flex !important; opacity: 1 !important; }
    .imagen-zoom { max-width: 90%; max-height: 85%; border-radius: 24px; box-shadow: 0 0 50px rgba(0,0,0,0.6); transform: scale(0.8); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2); }
    .modal-activo .imagen-zoom { transform: scale(1); }

    .textura-terciopelo {
      background: radial-gradient(circle at 50% 30%, #5c0620 0%, #3b0212 70%, #1e0008 100%);
      box-shadow: inset 0 0 35px rgba(0, 0, 0, 0.85), 0 10px 25px rgba(0, 0, 0, 0.45);
      border: 1.5px solid rgba(212, 163, 115, 0.25);
    }
    
    .textura-coreano {
      background: linear-gradient(135deg, #fce7f3 0%, #fbcfe8 100%);
      opacity: 0.95;
      box-shadow: inset 0 0 25px rgba(219, 39, 119, 0.15), 0 8px 20px rgba(0, 0, 0, 0.1);
      border-radius: 30px 30px 40px 40px;
    }
    
    .textura-kraft {
      background: linear-gradient(150deg, #d2b48c 0%, #b59068 50%, #8b653f 100%);
      box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.25), 0 8px 20px rgba(0, 0, 0, 0.15);
      border-radius: 12px;
    }

    .tulipan-chenilla {
      background: radial-gradient(circle at 35% 35%, #f43f5e 15%, #be123c 65%, #6c041d 100%);
      box-shadow: 0 0 12px rgba(244, 63, 94, 0.5), inset 0 0 6px rgba(255, 255, 255, 0.3);
      filter: drop-shadow(0 0 1px rgba(244, 63, 94, 0.8));
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      position: absolute;
      transform-origin: bottom center;
    }

    @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
    @keyframes pulsoCorazon {
      0% { box-shadow: 0 0 0 0 rgba(153, 27, 27, 0.3); }
      50% { box-shadow: 0 0 0 6px rgba(153, 27, 27, 0); }
      100% { box-shadow: 0 0 0 0 rgba(153, 27, 27, 0); }
    }
    @keyframes pulsoRespiracion {
      0% { box-shadow: 0 0 4px rgba(197, 168, 160, 0.2); transform: scale(1); }
      50% { box-shadow: 0 0 14px rgba(197, 168, 160, 0.5); transform: scale(1.05); }
      100% { box-shadow: 0 0 4px rgba(197, 168, 160, 0.2); transform: scale(1); }
    }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="transition-colors duration-300">

  <div id="pantalla-arranque" class="pantalla-arranque">
    <div class="text-center">
      <h1 class="titulo-arranque">NIVANI</h1>
      <p class="text-[0.65rem] tracking-[6px] text-stone-400 dark:text-stone-500 uppercase mt-2">Atelier de Modelado en Chenilla</p>
    </div>
  </div>

  <div id="alerta-offline" class="alerta-offline">
    <i class="fas fa-wifi mr-2"></i> Conexión inestable. Cargando Atelier fuera de línea.
  </div>

  <div class="interfaz-fija">
    <h1 class="titulo-marca select-none">NIVANI</h1>
    <div class="bloque-buscador">
      <i class="fas fa-search"></i>
      <input type="text" id="buscador-vivo" placeholder="Buscar en el atelier...">
    </div>
  </div>

  <main class="panel-catalogo" id="panel-scroll">
    <div id="contenedor-matriz" class="matriz-simetrica">
      <div id="estado-vacio" class="estado-vacio">
        <i class="fas fa-seedling"></i>
        <p>No encontramos esta flor. Explora nuestro catálogo.</p>
      </div>
    </div>
  </main>

  <button id="btn-subir" class="btn-subir"><i class="fas fa-chevron-up"></i></button>

  <div id="dock-flotante" class="dock-flotante-wrapper">
    <div class="dock-flotante">
      <nav id="contenedor-hud" class="contenedor-hud select-none"></nav>
      <button id="btn-bolsa-abrir" class="btn-bolsa-abrir relative">
        <i id="icono-bolsa-compras" class="fas fa-shopping-bag text-[var(--color-acento)]"></i>
        <span>Pedido</span>
        <span id="contador-pedido" class="bg-[var(--color-acento)] text-stone-900 font-bold text-[10px] w-5 h-5 rounded-full flex items-center justify-center">0</span>
      </button>
    </div>
  </div>

  <div id="zoom-modal" class="modal-zoom">
    <img id="imagen-ampliada" class="imagen-zoom" src="">
  </div>

  <div id="toast-contenedor" class="fixed top-[calc(1.5rem+env(safe-area-inset-top))] right-6 z-[10000] flex flex-col gap-2 pointer-events-none"></div>

  <!-- PANTALLA COMPLETA DE PEDIDOS (Optimizada para 100dvh real en iPhone) -->
  <div id="pedido-drawer" class="fixed inset-0 w-full h-[100dvh] bg-[var(--color-fondo)] z-[5000] transform translate-y-full transition-transform duration-500 ease-out flex flex-col pt-[env(safe-area-inset-top)] pb-[env(safe-area-inset-bottom)]">
    
    <!-- Header Fijo Superior -->
    <div class="px-5 py-3 border-b border-stone-200/10 bg-[var(--color-cristal)] backdrop-blur-xl flex items-center justify-between shadow-sm flex-none z-50">
      <div class="flex items-center gap-3">
        <button id="btn-bolsa-cerrar" class="w-9 h-9 rounded-full bg-[var(--color-recuadro)] border border-stone-200/10 flex items-center justify-center text-[var(--color-texto-sec)] hover:text-[var(--color-texto)] transition-all shadow-sm">
          <i class="fas fa-chevron-down"></i>
        </button>
        <h2 class="font-serif italic text-lg font-semibold text-[var(--color-texto)]">Atelier & Pedidos</h2>
      </div>
    </div>

    <!-- Pestañas Estilo Píldora (Flex-none para no encogerse) -->
    <div class="px-4 py-3 bg-[var(--color-cristal)] border-b border-stone-200/5 flex justify-center flex-none z-40">
      <div class="flex bg-[var(--color-recuadro)] border border-stone-200/10 rounded-xl p-1 w-full max-w-md text-[10px] font-bold uppercase tracking-wider select-none shadow-inner">
        <button id="tab-carrito" class="flex-1 py-2.5 text-center rounded-lg bg-[var(--color-acento)] text-[var(--color-fondo)] shadow-sm transition-all">Carrito de Flores</button>
        <button id="tab-taller" class="flex-1 py-2.5 text-center rounded-lg bg-transparent text-[var(--color-texto-sec)] transition-all">Diseña tu Ramo 🎨</button>
      </div>
    </div>

    <!-- ÁREA PRINCIPAL ELÁSTICA (Se comprime para evitar el scroll vertical si hay pocas flores) -->
    <div id="drawer-contenido" class="flex-1 overflow-hidden flex flex-col relative w-full max-w-5xl mx-auto">
      <div class="w-full h-full p-3 md:p-6 flex flex-col">
        
        <!-- ========================================================= -->
        <!-- PESTAÑA 1: CARRITO (Lógica No-Scroll o Scroll Mínimo) -->
        <!-- ========================================================= -->
        <div id="seccion-tab-carrito" class="flex-1 flex flex-col lg:flex-row gap-3 lg:gap-6 min-h-0 w-full">
          
          <!-- SECCIÓN A: LISTA (Toma el espacio restante, hace scroll internamente solo si sobra contenido) -->
          <div class="flex-1 flex flex-col min-h-0 bg-[var(--color-recuadro)] border border-stone-200/10 rounded-[20px] p-3 shadow-sm">
            <h3 class="flex-none text-[10px] font-bold uppercase tracking-widest text-[var(--color-texto-sec)] mb-2 px-1"><i class="fas fa-shopping-bag mr-1"></i>Selecciones</h3>
            
            <div id="carrito-lista" class="flex-1 overflow-y-auto space-y-2 pr-1 custom-scrollbar" style="-webkit-overflow-scrolling: touch;"></div>
            
            <div id="carrito-vacio-msg" class="flex-1 flex flex-col items-center justify-center gap-2">
              <i class="fas fa-shopping-basket text-4xl opacity-20 text-[var(--color-acento)]"></i>
              <p class="text-xs font-light text-[var(--color-texto-sec)]">Tu bolsa está vacía.</p>

  <script>
    const ConfiguracionFirebase = {
      apiKey: "AIzaSyBqsTxi2PoFjPgvre4QqZvWHczUoO5sqU8",
      projectId: "limpiapipas-98f13",
      appId: "1:456357010113:web:c10522df7cdb2dbea1d240"
    };

    const VECTORES_WPP = {
      linea1: "59178593187",
      linea2: "59177047557"
    };

    const FRASES_ESPERA = [
      "Hilando la chenilla...",
      "Moldeando el terciopelo...",
      "Tejiendo pétalo a pétalo...",
      "Esculpiendo el tallo de felpa...",
      "Peinando fibras suaves...",
      "Modelando el alma de alambre...",
      "Peinando las felpas de autor...",
      "Abriendo el Atelier..."
    ];

    const TIEMPOS_ELABORACION = [
      "1.5 horas de modelado",
      "2 horas de moldeado",
      "3 horas de orfebrería",
      "4 horas de tejido fino",
      "2.5 horas de hilado",
      "3.5 horas de modelado"
    ];

    const EstadoAplicacion = {
      datosProcesados: [],
      categoriasUnicas: [],
      filtroActivo: "TODO",
      textoBusqueda: "",
      primeraCarga: true,
      
      favoritos: JSON.parse(localStorage.getItem('nivani_favs')) || [],
      carrito: [],
      
      simuladorRamo: {
        envoltura: 'terciopelo',
        cantidadFlores: 3,
        follajeGipso: false,
        follajeOrganza: false
      },
      estiloTarjetaDedicatoria: 'dorado'
    };

    const ObserverAnimacion = new IntersectionObserver((entradas, observador) => {
      entradas.forEach(entrada => {
        if (entrada.isIntersecting) {
          entrada.target.classList.add('revelado');
          observador.unobserve(entrada.target);
        }
      });
    }, { threshold: 0.05, rootMargin: "0px 0px -10px 0px" });

    const Utilidades = {
      quitarTildes: function(texto) {
        return (texto || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "");
      },
      vibrar: function() {
        if (navigator.vibrate) navigator.vibrate(15);
      },
      obtenerFraseEsperaAleatoria: function() {
        return FRASES_ESPERA[Math.floor(Math.random() * FRASES_ESPERA.length)];
      },
      obtenerTiempoElaboracionAleatorio: function() {
        return TIEMPOS_ELABORACION[Math.floor(Math.random() * TIEMPOS_ELABORACION.length)];
      },
      mostrarToast: function(mensaje, esExitoso = true) {
        const container = document.getElementById('toast-contenedor');
        const toast = document.createElement('div');
        toast.className = "pointer-events-auto bg-[var(--color-tarjeta)] border border-stone-200/10 text-[var(--color-texto)] px-4 py-3 rounded-xl shadow-2xl flex items-center gap-3 max-w-xs transition-all duration-300 opacity-0 transform translate-y-[-10px]";
        
        let icono = esExitoso ? '<i class="fas fa-check-circle text-emerald-500"></i>' : '<i class="fas fa-heart text-pink-500"></i>';
        toast.innerHTML = `${icono} <span class="text-xs font-semibold">${mensaje}</span>`;
        container.appendChild(toast);

        setTimeout(() => {
          toast.classList.remove('opacity-0', 'translate-y-[-10px]');
          toast.classList.add('opacity-100', 'translate-y-0');
        }, 50);

        setTimeout(() => {
          toast.classList.add('opacity-0', 'translate-y-[-10px]');
          setTimeout(() => toast.remove(), 300);
        }, 2500);
      },
      ejecutarEfectoVuelo: function(event) {
        const rectOrigen = event.currentTarget.getBoundingClientRect();
        const rectDestino = document.getElementById('icono-bolsa-compras').getBoundingClientRect();

        const particula = document.createElement('div');
        particula.className = "fixed pointer-events-none z-[9999] transition-all duration-700 ease-out text-lg select-none";
        particula.innerHTML = "🌸";
        particula.style.left = `${rectOrigen.left + rectOrigen.width/2}px`;
        particula.style.top = `${rectOrigen.top}px`;
        document.body.appendChild(particula);

        setTimeout(() => {
          particula.style.left = `${rectDestino.left}px`;
          particula.style.top = `${rectDestino.top}px`;
          particula.style.transform = "scale(0.3) rotate(360deg)";
          particula.style.opacity = "0.3";
        }, 50);

        setTimeout(() => {
          particula.remove();
          const bagIcon = document.getElementById('icono-bolsa-compras');
          bagIcon.classList.add('scale-125', 'text-emerald-500');
          setTimeout(() => bagIcon.classList.remove('scale-125', 'text-emerald-500'), 300);
        }, 750);
      },
      diseccionarNombre: function(cadenaCruda) {
        let cadena = cadenaCruda || "";
        let res = { grupo: "GENERAL", nombre: cadena.trim(), badgeNuevo: false, badgeEscaso: false };
        let indiceSeparador = cadena.match(/[-_]/);
        
        if (indiceSeparador) {
          let pos = indiceSeparador.index;
          res.grupo = cadena.substring(0, pos).trim().toUpperCase();
          let nombrePuro = cadena.substring(pos + 1).trim();
          
          res.badgeNuevo = nombrePuro.includes('+');
          res.badgeEscaso = nombrePuro.includes('*');
          res.nombre = nombrePuro.replace('+', '').replace('*', '').trim();
        } else {
          res.badgeNuevo = cadena.includes('+');
          res.badgeEscaso = cadena.includes('*');
          res.nombre = cadena.replace('+', '').replace('*', '').trim();
        }
        return res;
      }
    };

    const MotorConexion = {
      iniciar: function() {
        firebase.initializeApp(ConfiguracionFirebase);
        let baseDatos = firebase.firestore();
        baseDatos.enablePersistence().catch(e => console.warn("Persistence offline fallida."));
        return baseDatos;
      }
    };

    const MotorUI = {
      referencias: {},
      mapearNodos: function() {
        this.referencias = {
          arranque: document.getElementById('pantalla-arranque'),
          offline: document.getElementById('alerta-offline'),
          matriz: document.getElementById('contenedor-matriz'),
          modal: document.getElementById('zoom-modal'),
          imagenAmpliada: document.getElementById('imagen-ampliada'),
          hud: document.getElementById('contenedor-hud'),
          buscador: document.getElementById('buscador-vivo'),
          estadoVacio: document.getElementById('estado-vacio'),
          panelScroll: document.getElementById('panel-scroll'),
          btnSubir: document.getElementById('btn-subir'),
          
          drawer: document.getElementById('pedido-drawer'),
          btnBolsaAbrir: document.getElementById('btn-bolsa-abrir'),
          btnBolsaCerrar: document.getElementById('btn-bolsa-cerrar'),
          contadorPedido: document.getElementById('contador-pedido'),
          carritoLista: document.getElementById('carrito-lista'),
          carritoVacioMsg: document.getElementById('carrito-vacio-msg'),
          carritoPrecioTotal: document.getElementById('carrito-precio-total'),
          btnEnviarPedido: document.getElementById('btn-enviar-pedido'),
          carritoDedicatoria: document.getElementById('carrito-dedicatoria'),
          
          tabCarrito: document.getElementById('tab-carrito'),
          tabTaller: document.getElementById('tab-taller'),
          seccionTabCarrito: document.getElementById('seccion-tab-carrito'),
          seccionTabTaller: document.getElementById('seccion-tab-taller'),
          
          simEnvoltorio: document.getElementById('sim-envoltorio'),
          simCantFlores: document.getElementById('sim-cant-flores'),
          btnSimMenos: document.getElementById('btn-sim-menos'),
          btnSimMas: document.getElementById('btn-sim-mas'),
          simCheckGipso: document.getElementById('sim-check-gipso'),
          simCheckOrganza: document.getElementById('sim-check-organza'),
          btnAniadirRamo: document.getElementById('btn-aniadir-ramo-personalizado'),
          simLienzoTextura: document.getElementById('simulador-lienzo-textura'),
          txtTexturaEnvoltura: document.getElementById('txt-textura-envoltura')
        };
      },
      renderizarHUD: function() {
        let cont = this.referencias.hud;
        cont.innerHTML = "";
        
        let arrFiltros = [
          { id: "TODO", texto: "Todo", icono: "fa-layer-group" },
          { id: "FAVORITOS", texto: "Favoritos", icono: "fa-heart" }
        ];
        
        EstadoAplicacion.categoriasUnicas.forEach(cat => {
          if (cat !== "GENERAL" && cat !== "") arrFiltros.push({ id: cat, texto: cat, icono: "fa-seedling" });
        });
        arrFiltros.push({ id: "PRECIO_BAJO", texto: "< 100 Bs", icono: "fa-wallet" });
        arrFiltros.push({ id: "PRECIO_ALTO", texto: "Premium", icono: "fa-crown" });

        arrFiltros.forEach(f => {
          let btn = document.createElement('button');
          btn.className = "boton-filtro" + (EstadoAplicacion.filtroActivo === f.id ? " filtro-activo" : "");
          btn.innerHTML = `<i class="fas ${f.icono}"></i> ${f.texto}`;
          btn.dataset.categoria = f.id;
          cont.appendChild(btn);
        });
      },
      renderizarCatalogo: function() {
        let tarjetasPrevias = this.referencias.matriz.querySelectorAll('.tarjeta-item');
        tarjetasPrevias.forEach(n => { ObserverAnimacion.unobserve(n); n.remove(); });
        
        let filtroCat = EstadoAplicacion.filtroActivo;
        let busqueda = Utilidades.quitarTildes(EstadoAplicacion.textoBusqueda).toUpperCase();
        let contadorVisual = 0;
        
        EstadoAplicacion.datosProcesados.forEach((item) => {
          let pasaFiltro = false;
          let pVal = parseInt(item.precio, 10);
          
          if (filtroCat === "TODO") pasaFiltro = true;
          else if (filtroCat === "FAVORITOS") pasaFiltro = EstadoAplicacion.favoritos.includes(item.id);
          else if (filtroCat === "PRECIO_BAJO") pasaFiltro = (!isNaN(pVal) && pVal < 100);
          else if (filtroCat === "PRECIO_ALTO") pasaFiltro = (!isNaN(pVal) && pVal >= 100);
          else pasaFiltro = (item.grupo === filtroCat);

          let pasaTex = Utilidades.quitarTildes(item.nombre).toUpperCase().includes(busqueda);
          
          if (pasaFiltro && pasaTex) {
            let tarjeta = document.createElement('div');
            tarjeta.className = "tarjeta-item";
            
            let contImg = document.createElement('div');
            contImg.className = "contenedor-imagen";

            let cargador = document.createElement('div');
            cargador.className = "cargador-atelier";
            cargador.innerHTML = `
              <i class="fas fa-fingerprint icono-huella-pulso"></i>
              <span class="texto-espera-narrativo">${Utilidades.obtenerFraseEsperaAleatoria()}</span>
            `;
            contImg.appendChild(cargador);

            let img = document.createElement('img');
            img.className = "imagen-item";
            img.src = item.img || item.direccion || "";
            img.dataset.url = img.src;
            
            img.onload = function() {
              img.classList.add('imagen-cargada');
              cargador.remove();
            };
            contImg.appendChild(img);

            if (item.badgeNuevo) {
              let b = document.createElement('div'); b.className = "badge-luxury badge-luxury-nuevo";
              b.innerHTML = '✦ Nuevo'; contImg.appendChild(b);
            }
            if (item.badgeEscaso) {
              let b = document.createElement('div'); b.className = "badge-luxury badge-luxury-escaso";
              b.innerHTML = '🔴 Limitado'; contImg.appendChild(b);
            }
            tarjeta.appendChild(contImg);
            
            let recuadro = document.createElement('div');
            recuadro.className = "recuadro-info";

            let esFav = EstadoAplicacion.favoritos.includes(item.id);
            let claseCorazon = esFav ? "fas fa-heart text-pink-500" : "far fa-heart";

            recuadro.innerHTML = `
              <div class="cabecera-info select-none">
                <div class="texto-grupo">${item.grupo}</div>
                <div class="flex items-center gap-3">
                  <button class="btn-favorito" data-id="${item.id}"><i class="${claseCorazon}"></i></button>
                  <button class="btn-share" data-nombre="${item.nombre}" title="Sugerir como Regalo"><i class="fas fa-gift"></i></button>
                </div>
              </div>
              <div class="texto-nombre" title="${item.nombre}">${item.nombre}</div>
              <div class="tiempo-elaboracion select-none">
                <i class="far fa-clock"></i> ${Utilidades.obtenerTiempoElaboracionAleatorio()}
              </div>
              <button class="btn-agregar-carrito w-full bg-stone-100 dark:bg-stone-800 hover:bg-[var(--color-acento)] hover:text-stone-900 text-[var(--color-texto)] py-2.5 mt-2 rounded-xl text-[10px] font-semibold uppercase tracking-wider transition-all" data-id="${item.id}">Añadir al Pedido</button>
            `;
            
            recuadro.querySelector('.btn-share').addEventListener('click', function(e) {
              Utilidades.vibrar(); 
              if (navigator.share) {
                navigator.share({
                  title: 'Nivani | ' + item.nombre,
                  text: `¡Mira esta hermosa flor moldeada en chenilla de Nivani: ${item.nombre}!`,
                  url: window.location.href
                }).catch(err => console.log('Share cancelado', err));
              }
            });

            recuadro.querySelector('.btn-favorito').addEventListener('click', function(e) {
              Utilidades.vibrar();
              MotorEventos.alternarFavorito(item.id);
            });

            recuadro.querySelector('.btn-agregar-carrito').addEventListener('click', function(e) {
              Utilidades.vibrar();
              Utilidades.ejecutarEfectoVuelo(e);
              MotorEventos.agregarAlCarrito(item);
            });

            tarjeta.appendChild(recuadro);
            this.referencias.matriz.appendChild(tarjeta);
            ObserverAnimacion.observe(tarjeta); 
            contadorVisual++;
          }
        });
        
        this.referencias.estadoVacio.style.display = (contadorVisual === 0) ? "flex" : "none";

        if (EstadoAplicacion.primeraCarga) {
          setTimeout(() => {
            if(this.referencias.arranque) this.referencias.arranque.classList.add('pantalla-oculta');
          }, 300);
          EstadoAplicacion.primeraCarga = false;
        }
      },
      abrirZoom: function(url) {
        Utilidades.vibrar(); this.referencias.imagenAmpliada.src = url;
        this.referencias.modal.classList.add('modal-activo');
      },
      cerrarZoom: function() { this.referencias.modal.classList.remove('modal-activo'); },
      
      actualizarContadoresPedido: function() {
        const count = EstadoAplicacion.carrito.reduce((acc, obj) => acc + obj.cantidad, 0);
        this.referencias.contadorPedido.innerText = count;
        this.referencias.contadorPedido.style.transform = "scale(1.3)";
        setTimeout(() => this.referencias.contadorPedido.style.transform = "scale(1)", 200);
      },
      renderizarCarrito: function() {
        let lista = this.referencias.carritoLista;
        lista.innerHTML = "";
        
        if (EstadoAplicacion.carrito.length === 0) {
          this.referencias.carritoVacioMsg.style.display = "flex";
        } else {
          this.referencias.carritoVacioMsg.style.display = "none";
          
          EstadoAplicacion.carrito.forEach((item, index) => {
            let div = document.createElement('div');
            /* Renderizado de celda hiper-compacta estilo iOS Native App */
            div.className = "flex items-center justify-between p-2 bg-[var(--color-tarjeta)] border border-stone-200/15 rounded-xl gap-2 shadow-sm animate-fade-in";
            
            let imgHTML = `<div class="w-10 h-10 rounded-lg bg-amber-500/10 flex items-center justify-center text-sm shrink-0"><i class="fas fa-magic text-[var(--color-acento)]"></i></div>`;
            if (item.img) {
              imgHTML = `<img src="${item.img}" class="w-10 h-10 rounded-lg object-cover shrink-0">`;
            }

            div.innerHTML = `
              <div class="flex items-center gap-2.5 min-w-0 flex-1">
                ${imgHTML}
                <div class="min-w-0">
                  <h4 class="text-[11px] font-bold text-[var(--color-texto)] leading-tight truncate pr-2">${item.nombre}</h4>
                  <p class="text-[9px] text-[var(--color-texto-sec)] font-bold uppercase mt-0.5 tracking-wider">${item.precio} Bs.</p>
                </div>
              </div>
              <div class="flex items-center gap-1.5 shrink-0">
                <button onclick="MotorEventos.cambiarCantidadCarrito(${index}, -1)" class="w-6 h-6 rounded-md bg-stone-100 dark:bg-stone-800 text-[var(--color-texto)] flex items-center justify-center text-xs font-bold transition-all hover:bg-stone-200">-</button>
                <span class="text-[11px] font-bold w-4 text-center">${item.cantidad}</span>
                <button onclick="MotorEventos.cambiarCantidadCarrito(${index}, 1)" class="w-6 h-6 rounded-md bg-stone-100 dark:bg-stone-800 text-[var(--color-texto)] flex items-center justify-center text-xs font-bold transition-all hover:bg-stone-200">+</button>
              </div>
            `;
            lista.appendChild(div);
          });
        }
        
        let total = EstadoAplicacion.carrito.reduce((acc, obj) => {
          let pVal = parseInt(obj.precio, 10);
          return acc + ((isNaN(pVal) ? 0 : pVal) * obj.cantidad);
        }, 0);
        
        this.referencias.carritoPrecioTotal.innerText = `${total} Bs.`;
      },
      actualizarPrevisualizadorRamo: function() {
        const config = EstadoAplicacion.simuladorRamo;
        const lienzo = this.referencias.simLienzoTextura;
        const txtEnvoltura = this.referencias.txtTexturaEnvoltura;
        const gipsoCapa = document.getElementById('lienzo-gipso');
        const organzaLazo = document.getElementById('lienzo-organza');
        const tulipanesContenedor = document.getElementById('lienzo-contenedor-tulipanes');

        lienzo.className = "flex-none lg:flex-1 h-44 md:h-auto md:aspect-square relative rounded-[20px] overflow-hidden flex flex-col items-center justify-center p-2 border border-stone-200/10 transition-all duration-500 shadow-inner shrink-0";
        if (config.envoltura === 'terciopelo') {
          lienzo.classList.add('textura-terciopelo');
          txtEnvoltura.innerText = "Textura: Terciopelo Burdeos Premium ✦";
          txtEnvoltura.className = "text-[9px] font-bold text-amber-300 tracking-widest uppercase block drop-shadow-md";
        } else if (config.envoltura === 'coreano') {
          lienzo.classList.add('textura-coreano');
          txtEnvoltura.innerText = "Textura: Papel Coreano Translúcido Rosado";
          txtEnvoltura.className = "text-[9px] font-bold text-pink-700 tracking-widest uppercase block";
        } else if (config.envoltura === 'kraft') {
          lienzo.classList.add('textura-kraft');
          txtEnvoltura.innerText = "Textura: Papel Kraft Rústico Fibroso";
          txtEnvoltura.className = "text-[9px] font-bold text-stone-800 tracking-widest uppercase block";
        }

        tulipanesContenedor.innerHTML = "";
        const cantidad = config.cantidadFlores;
        
        const paletaColores = [
          "radial-gradient(circle at 35% 35%, #f43f5e 15%, #be123c 65%, #6c041d 100%)",
          "radial-gradient(circle at 35% 35%, #fb7185 15%, #f43f5e 65%, #9f1239 100%)",
          "radial-gradient(circle at 35% 35%, #fda4af 15%, #f43f5e 65%, #4c0519 100%)",
          "radial-gradient(circle at 35% 35%, #fbbf24 15%, #d97706 65%, #78350f 100%)"
        ];

        for (let i = 0; i < cantidad; i++) {
          const tulipan = document.createElement('div');
          tulipan.className = "tulipan-chenilla transition-all duration-500";
          
          tulipan.style.width = "40px";
          tulipan.style.height = "52px";
          tulipan.style.background = paletaColores[i % paletaColores.length];
          
          const desplazamientoX = (i - (cantidad - 1) / 2) * 22; 
          const inclinacionRotacion = (i - (cantidad - 1) / 2) * 8;
          const elevacionY = Math.abs(i - (cantidad - 1) / 2) * 4 - 15;

          tulipan.style.transform = `translateX(${desplazamientoX}px) translateY(${elevacionY}px) rotate(${inclinacionRotacion}deg)`;
          tulipanesContenedor.appendChild(tulipan);
        }

        if (config.follajeGipso) {
          gipsoCapa.classList.remove('opacity-0');
          gipsoCapa.classList.add('opacity-90');
        } else {
          gipsoCapa.classList.remove('opacity-90');
          gipsoCapa.classList.add('opacity-0');
        }

        if (config.follajeOrganza) {
          organzaLazo.style.transform = "scale(1)";
        } else {
          organzaLazo.style.transform = "scale(0)";
        }
      }
    };

    const MotorEventos = {
      escucharDOM: function() {
        let r = MotorUI.referencias; let timer = null;
        let lastScrollTop = 0;
        
        r.buscador.addEventListener('input', e => {
          EstadoAplicacion.filtroActivo = "TODO"; MotorUI.renderizarHUD();
          clearTimeout(timer);
          timer = setTimeout(() => {
            EstadoAplicacion.textoBusqueda = e.target.value; MotorUI.renderizarCatalogo();
          }, 300);
        });

        r.hud.addEventListener('click', e => {
          let target = e.target.closest('.boton-filtro');
          if (target) {
            Utilidades.vibrar(); EstadoAplicacion.filtroActivo = target.dataset.categoria;
            MotorUI.renderizarHUD(); MotorUI.renderizarCatalogo();
          }
        });
        
        r.matriz.addEventListener('click', e => {
          if (e.target.classList.contains('imagen-item')) MotorUI.abrirZoom(e.target.dataset.url);
        });
        
        r.modal.addEventListener('click', () => MotorUI.cerrarZoom());
        
        r.panelScroll.addEventListener('scroll', () => {
          let st = r.panelScroll.scrollTop;
          
          if (st > 300) r.btnSubir.classList.add('visible');
          else r.btnSubir.classList.remove('visible');

          const dock = document.getElementById('dock-flotante');
          if (st > lastScrollTop && st > 150) {
            dock.classList.add('dock-oculto');
          } else {
            dock.classList.remove('dock-oculto');
          }
          lastScrollTop = st <= 0 ? 0 : st;
        });

        r.btnSubir.addEventListener('click', () => {
          Utilidades.vibrar(); r.panelScroll.scrollTo({ top: 0, behavior: 'smooth' });
        });

        window.addEventListener('offline', () => r.offline.classList.add('visible'));
        window.addEventListener('online', () => r.offline.classList.remove('visible'));
        
        r.btnBolsaAbrir.addEventListener('click', () => {
          Utilidades.vibrar();
          r.drawer.classList.remove('translate-y-full');
          MotorUI.renderizarCarrito();
        });
        r.btnBolsaCerrar.addEventListener('click', () => {
          Utilidades.vibrar();
          r.drawer.classList.add('translate-y-full');
        });

        r.tabCarrito.addEventListener('click', () => {
          Utilidades.vibrar();
          this.cambiarPestania('carrito');
        });
        r.tabTaller.addEventListener('click', () => {
          Utilidades.vibrar();
          this.cambiarPestania('taller');
          MotorUI.actualizarPrevisualizadorRamo();
        });

        r.simEnvoltorio.addEventListener('change', () => {
          EstadoAplicacion.simuladorRamo.envoltura = r.simEnvoltorio.value;
          MotorUI.actualizarPrevisualizadorRamo();
        });
        r.btnSimMenos.addEventListener('click', () => {
          Utilidades.vibrar();
          if (EstadoAplicacion.simuladorRamo.cantidadFlores > 1) {
            EstadoAplicacion.simuladorRamo.cantidadFlores--;
            r.simCantFlores.innerText = EstadoAplicacion.simuladorRamo.cantidadFlores;
            MotorUI.actualizarPrevisualizadorRamo();
          }
        });
        r.btnSimMas.addEventListener('click', () => {
          Utilidades.vibrar();
          if (EstadoAplicacion.simuladorRamo.cantidadFlores < 12) {
            EstadoAplicacion.simuladorRamo.cantidadFlores++;
            r.simCantFlores.innerText = EstadoAplicacion.simuladorRamo.cantidadFlores;
            MotorUI.actualizarPrevisualizadorRamo();
          }
        });
        r.simCheckGipso.addEventListener('change', () => {
          EstadoAplicacion.simuladorRamo.follajeGipso = r.simCheckGipso.checked;
          MotorUI.actualizarPrevisualizadorRamo();
        });
        r.simCheckOrganza.addEventListener('change', () => {
          EstadoAplicacion.simuladorRamo.follajeOrganza = r.simCheckOrganza.checked;
          MotorUI.actualizarPrevisualizadorRamo();
        });

        r.btnAniadirRamo.addEventListener('click', () => {
          Utilidades.vibrar();
          this.agregarRamoPersonalizadoAlCarrito();
        });

        r.btnEnviarPedido.addEventListener('click', () => {
          Utilidades.vibrar();
          this.enviarPedidoWhatsApp();
        });
      },
      sincronizarFirebase: function(db) {
        db.collection("flores").onSnapshot(snapshot => {
          let arr = []; let cats = new Set();
          
          snapshot.docs.forEach(doc => {
            let d = doc.data();
            let p = Utilidades.diseccionarNombre(d.nombre);
            cats.add(p.grupo);
            
            arr.push({
              id: doc.id, grupo: p.grupo, nombre: p.nombre,
              badgeNuevo: p.badgeNuevo, badgeEscaso: p.badgeEscaso,
              img: d.img || d.direccion, precio: d.precio
            });
          });
          
          EstadoAplicacion.datosProcesados = arr;
          EstadoAplicacion.categoriasUnicas = Array.from(cats).sort();
          
          MotorUI.renderizarHUD();
          MotorUI.renderizarCatalogo();
        });
      },
      alternarFavorito: function(idItem) {
        let index = EstadoAplicacion.favoritos.indexOf(idItem);
        if (index === -1) {
          EstadoAplicacion.favoritos.push(idItem);
          Utilidades.mostrarToast("Flor guardada en tus favoritos ♥", false);
        } else {
          EstadoAplicacion.favoritos.splice(index, 1);
        }
        localStorage.setItem('nivani_favs', JSON.stringify(EstadoAplicacion.favoritos));
        MotorUI.renderizarCatalogo();
      },
      agregarAlCarrito: function(producto) {
        let existente = EstadoAplicacion.carrito.find(obj => obj.id === producto.id);
        if (existente) {
          existente.cantidad++;
        } else {
          EstadoAplicacion.carrito.push({
            id: producto.id,
            nombre: producto.nombre,
            precio: producto.precio,
            img: producto.img,
            cantidad: 1
          });
        }
        MotorUI.actualizarContadoresPedido();
        Utilidades.mostrarToast("Agregada al Pedido");
      },
      cambiarCantidadCarrito: function(index, cambio) {
        Utilidades.vibrar();
        let item = EstadoAplicacion.carrito[index];
        if (item) {
          item.cantidad += cambio;
          if (item.cantidad <= 0) {
            EstadoAplicacion.carrito.splice(index, 1);
          }
          MotorUI.actualizarContadoresPedido();
          MotorUI.renderizarCarrito();
        }
      },
      cambiarPestania: function(tabName) {
        let r = MotorUI.referencias;
        if (tabName === 'carrito') {
          r.tabCarrito.className = "flex-1 py-2.5 text-center rounded-lg bg-[var(--color-acento)] text-[var(--color-fondo)] shadow-sm transition-all";
          r.tabTaller.className = "flex-1 py-2.5 text-center rounded-lg bg-transparent text-[var(--color-texto-sec)] transition-all";
          r.seccionTabCarrito.classList.remove('hidden');
          r.seccionTabTaller.classList.add('hidden');
        } else {
          r.tabTaller.className = "flex-1 py-2.5 text-center rounded-lg bg-[var(--color-acento)] text-[var(--color-fondo)] shadow-sm transition-all";
          r.tabCarrito.className = "flex-1 py-2.5 text-center rounded-lg bg-transparent text-[var(--color-texto-sec)] transition-all";
          r.seccionTabTaller.classList.remove('hidden');
          r.seccionTabCarrito.classList.add('hidden');
        }
      },
      agregarRamoPersonalizadoAlCarrito: function() {
        const config = EstadoAplicacion.simuladorRamo;
        let subtotalFlores = config.cantidadFlores * 35;
        let precioEnv = config.envoltura === 'terciopelo' ? 35 : (config.envoltura === 'coreano' ? 20 : 15);
        let totalRamo = subtotalFlores + precioEnv;
        
        let extras = [];
        if (config.follajeGipso) { totalRamo += 15; extras.push("Gipsófila"); }
        if (config.follajeOrganza) { totalRamo += 10; extras.push("Organza"); }

        let descTextura = config.envoltura === 'terciopelo' ? "Terciopelo" : (config.envoltura === 'coreano' ? "Coreano" : "Kraft");
        let nombreRamo = `Ramo Personalizado ${descTextura} (${config.cantidadFlores} Tulipanes)`;
        if (extras.length > 0) nombreRamo += ` + ${extras.join(' & ')}`;

        EstadoAplicacion.carrito.push({
          id: 'personalizado_' + Date.now(),
          nombre: nombreRamo,
          precio: totalRamo,
          img: null,
          cantidad: 1
        });

        MotorUI.actualizarContadoresPedido();
        Utilidades.mostrarToast("¡Ramo Creado y Añadido!");
        this.cambiarPestania('carrito');
        MotorUI.renderizarCarrito();
      },
      enviarPedidoWhatsApp: function() {
        if (EstadoAplicacion.carrito.length === 0) {
          alert("Añade al menos una flor o diseña un ramo para poder enviar tu pedido.");
          return;
        }

        const canales = document.getElementsByName('wpp-linea-destino');
        let canalElegido = "linea1";
        for (let i = 0; i < canales.length; i++) {
          if (canales[i].checked) {
            canalElegido = canales[i].value;
            break;
          }
        }
        const wppNumero = VECTORES_WPP[canalElegido];

        let msg = `✦ *NIVANI | SOLICITUD DE PEDIDO ATELIER* ✦\n\n`;
        let totalGeneral = 0;

        EstadoAplicacion.carrito.forEach((item, index) => {
          let pVal = parseInt(item.precio, 10);
          let sub = (isNaN(pVal) ? 0 : pVal) * item.cantidad;
          totalGeneral += sub;
          msg += `*${index + 1}. ${item.nombre}*\n`;
          msg += `   Cant: ${item.cantidad} x ${item.precio} Bs. | Sub: ${sub} Bs.\n\n`;
        });

        msg += `--------------------------------\n`;
        msg += `*TOTAL DE TU COMBINACIÓN:* ${totalGeneral} Bs.\n\n`;

        const dedicatoria = document.getElementById('carrito-dedicatoria').value.trim();
        if (dedicatoria !== "") {
          msg += `💌 *TARJETA DEDICATORIA (${EstadoAplicacion.estiloTarjetaDedicatoria.toUpperCase()}):*\n`;
          msg += `"${dedicatoria}"\n\n`;
        }

        msg += `¿Se encuentra disponible para coordinar la entrega? Muchas gracias.`;

        const link = `https://wa.me/${wppNumero}?text=${encodeURIComponent(msg)}`;
        window.open(link, '_blank');
      }
    };

    function cambiarEstiloDedicatoria(estilo) {
      EstadoAplicacion.estiloTarjetaDedicatoria = estilo;
      Utilidades.vibrar();
      Utilidades.mostrarToast(`Tarjeta: acabado ${estilo.toUpperCase()} listo`);
    }

    document.addEventListener('DOMContentLoaded', () => {
      let db = MotorConexion.iniciar();
      MotorUI.mapearNodos();
      MotorEventos.escucharDOM();
      MotorEventos.sincronizarFirebase(db);
      if (!navigator.onLine) MotorUI.referencias.offline.classList.add('visible');
    });
  </script>
</body>
</html>
