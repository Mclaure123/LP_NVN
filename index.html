<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nivani | Boutique de Flores Artesanales</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  
  <style>
    /* ====================================================================== */
    /* 2_ESTILOS_CSS_VARIABLES (SOPORTE DARK MODE NATIVO)                     */
    /* ====================================================================== */
    :root {
      /* MODO CLARO (Default) */
      --color-fondo: #fdfcf8;
      --color-acento: #c5a8a0;
      --color-texto: #2a2a2a;
      --color-texto-sec: #888888;
      --color-wpp: #16a34a;
      --color-wpp-fondo: #f0fdf4;
      --color-wpp-borde: #bbf7d0;
      --color-tarjeta: #ffffff;
      --color-recuadro: #fdfdfd;
      --color-cristal: rgba(253, 252, 248, 0.85);
      --sombra-tarjeta: 0 10px 20px rgba(0,0,0,0.04);
      --radio-borde: 24px;
      --radio-borde-hud: 20px;
      --fuente-ui: 'Inter', sans-serif;
      --fuente-lujo: 'Playfair Display', serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        /* MODO OSCURO (Premium Ónice) */
        --color-fondo: #121212;
        --color-acento: #e5c8c0;
        --color-texto: #f5f5f5;
        --color-texto-sec: #aaaaaa;
        --color-wpp: #22c55e;
        --color-wpp-fondo: rgba(34, 197, 94, 0.1);
        --color-wpp-borde: rgba(34, 197, 94, 0.2);
        --color-tarjeta: #1e1e1e;
        --color-recuadro: #242424;
        --color-cristal: rgba(18, 18, 18, 0.85);
        --sombra-tarjeta: 0 10px 30px rgba(0,0,0,0.3);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: radial-gradient(circle at top center, var(--color-tarjeta) 0%, var(--color-fondo) 100%);
      background-attachment: fixed;
      color: var(--color-texto);
      font-family: var(--fuente-ui);
      width: 100vw; height: 100vh;
      overflow: hidden; display: flex; flex-direction: column;
    }

    /* ====================================================================== */
    /* TELÓN DE ARRANQUE Y ALERTA OFFLINE                                     */
    /* ====================================================================== */
    .pantalla-arranque {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: var(--color-fondo); z-index: 99999;
      display: flex; justify-content: center; align-items: center;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    .pantalla-oculta { opacity: 0; visibility: hidden; }
    
    .titulo-arranque {
      font-family: var(--fuente-ui); font-weight: 200; letter-spacing: 15px;
      font-size: 3rem; text-transform: uppercase; color: var(--color-texto);
      margin-right: -15px; animation: pulsoArranque 2.5s infinite ease-in-out;
    }
    @keyframes pulsoArranque {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.02); }
    }

    .alerta-offline {
      position: fixed; bottom: 0; left: 0; width: 100%;
      background: #b91c1c; color: white; text-align: center;
      padding: 10px; font-size: 0.85rem; font-weight: 600;
      transform: translateY(100%); transition: transform 0.4s ease; z-index: 999;
    }
    .alerta-offline.visible { transform: translateY(0); }

    /* ====================================================================== */
    /* INTERFAZ FLOTANTE - HUD                                                */
    /* ====================================================================== */
    .interfaz-fija {
      position: sticky; top: 0; z-index: 100;
      background-color: var(--color-cristal);
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      border-bottom: 1px solid rgba(197, 168, 160, 0.1);
      padding: 20px 25px 15px 25px;
      display: flex; flex-direction: column; align-items: center; flex-shrink: 0;
    }

    .titulo-marca {
      font-family: var(--fuente-ui); font-weight: 200; letter-spacing: 15px;
      font-size: 2.6rem; margin-bottom: 15px; text-transform: uppercase;
      color: var(--color-texto); text-shadow: 0 2px 10px rgba(0,0,0,0.05); margin-right: -15px;
    }

    .hud-wrapper {
      display: flex; justify-content: space-between; align-items: center;
      width: 100%; max-width: 1200px; gap: 20px; flex-wrap: wrap;
    }

    .contenedor-hud { display: flex; gap: 8px; flex-wrap: wrap; flex: 1; align-items: center; }

    .boton-filtro {
      padding: 8px 16px; border-radius: var(--radio-borde-hud);
      border: 1px solid var(--color-acento); background-color: transparent;
      color: var(--color-acento); font-weight: 600; font-size: 0.75rem;
      cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-transform: uppercase; display: flex; align-items: center; gap: 6px;
    }
    .boton-filtro:hover { background-color: rgba(197, 168, 160, 0.08); transform: translateY(-2px); }
    .filtro-activo { background-color: var(--color-acento) !important; color: var(--color-fondo) !important; box-shadow: 0 4px 15px rgba(197, 168, 160, 0.3); }

    .bloque-buscador { width: 100%; max-width: 300px; position: relative; }
    .bloque-buscador input {
      width: 100%; padding: 10px 15px 10px 35px; border-radius: var(--radio-borde-hud);
      border: 1px solid rgba(197, 168, 160, 0.4); background-color: var(--color-recuadro);
      color: var(--color-texto); font-size: 0.9rem; outline: none; transition: all 0.3s ease;
    }
    .bloque-buscador input:focus { border-color: var(--color-acento); box-shadow: 0 4px 15px rgba(197, 168, 160, 0.15); }
    .bloque-buscador i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--color-acento); font-size: 0.9rem; }

    /* ====================================================================== */
    /* MATRIZ DE CATÁLOGO Y TARJETAS VIRTUALIZADAS                            */
    /* ====================================================================== */
    .panel-catalogo { flex-grow: 1; overflow-y: auto; padding: 25px 20px 80px 20px; scroll-behavior: smooth; }
    .panel-catalogo::-webkit-scrollbar { width: 5px; }
    .panel-catalogo::-webkit-scrollbar-thumb { background-color: rgba(197, 168, 160, 0.3); border-radius: 5px; }

    .matriz-simetrica {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 18px; max-width: 1200px; margin: 0 auto; position: relative;
    }

    .estado-vacio {
      grid-column: 1 / -1; text-align: center; padding: 60px 20px;
      display: none; flex-direction: column; align-items: center; animation: fadeIn 0.5s ease-out;
    }
    .estado-vacio i { font-size: 3rem; color: var(--color-acento); opacity: 0.5; margin-bottom: 15px; }
    .estado-vacio p { font-size: 1.1rem; color: var(--color-texto-sec); font-weight: 300; }

    .tarjeta-item {
      background-color: var(--color-tarjeta); border-radius: var(--radio-borde); padding: 8px;
      box-shadow: var(--sombra-tarjeta); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
      display: flex; flex-direction: column; position: relative;
      /* Rendimiento Élite: Paginación Virtual Nativa */
      content-visibility: auto; contain-intrinsic-size: 350px;
      /* Animación Intersection Observer */
      opacity: 0; transform: translateY(30px);
    }
    .tarjeta-item.revelado { opacity: 1; transform: translateY(0); }
    .tarjeta-item:hover { transform: translateY(-6px); box-shadow: 0 15px 35px rgba(0,0,0,0.15); }

    /* PRECARGA: SKELETON SHIMMER */
    .contenedor-imagen {
      position: relative; width: 100%; height: 180px; border-radius: 18px; overflow: hidden;
      background-color: var(--color-recuadro);
    }
    .esqueleto-shimmer {
      background: linear-gradient(90deg, var(--color-recuadro) 0px, var(--color-tarjeta) 40px, var(--color-recuadro) 80px);
      background-size: 200% 100%; animation: shimmer 1.5s infinite linear;
    }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

    .imagen-item {
      width: 100%; height: 100%; object-fit: cover; cursor: zoom-in;
      opacity: 0; transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
    }
    .imagen-cargada { opacity: 1; }
    .tarjeta-item:hover .imagen-cargada { transform: scale(1.08); }

    /* GATILLOS MENTALES CÁPSULAS (LUXURY) */
    .badge-luxury {
      position: absolute; bottom: 8px; right: 8px; padding: 5px 12px;
      border-radius: 20px; font-size: 0.6rem; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; z-index: 10; backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px); display: flex; align-items: center; gap: 5px;
    }
    .badge-luxury-nuevo { background: rgba(240, 253, 244, 0.8); color: #0f766e; border: 1px solid rgba(15, 118, 110, 0.2); animation: pulsoRespiracion 3s infinite ease-in-out; }
    .badge-luxury-escaso { background: rgba(254, 242, 242, 0.8); color: #991b1b; border: 1px solid rgba(153, 27, 27, 0.2); animation: pulsoCorazon 1.8s infinite; }

    /* RECUADRO DE INTEGRACIÓN */
    .recuadro-info {
      background: var(--color-recuadro); border: 1px solid rgba(197, 168, 160, 0.1); border-radius: 18px;
      padding: 12px; margin-top: 8px; display: flex; flex-direction: column; flex-grow: 1; gap: 4px;
    }
    
    .cabecera-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .texto-grupo { font-size: 0.65rem; color: var(--color-acento); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }
    .btn-share { background: transparent; border: none; color: var(--color-texto-sec); cursor: pointer; transition: color 0.2s; font-size: 0.9rem; }
    .btn-share:hover { color: var(--color-acento); transform: scale(1.1); }

    .texto-nombre {
      font-family: var(--fuente-lujo); font-weight: 600; font-size: 1.15rem;
      color: var(--color-texto); line-height: 1.2; flex-grow: 1; font-style: italic;
    }
    .texto-precio { font-weight: 700; color: var(--color-texto); font-size: 1.1rem; margin-top: 6px; }

    /* BOTONERA DUAL WHATSAPP MAGNETICA */
    .contenedor-wpp-dual { display: flex; gap: 6px; margin-top: 8px; }
    .btn-wpp-sm {
      flex: 1; display: flex; justify-content: center; align-items: center; gap: 6px;
      background-color: var(--color-wpp-fondo); color: var(--color-wpp);
      border: 1px solid var(--color-wpp-borde); padding: 8px 0; border-radius: 12px;
      text-decoration: none; font-size: 0.75rem; font-weight: 700; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .btn-wpp-sm:hover { background-color: var(--color-wpp); color: var(--color-fondo); transform: translateY(-3px) scale(1.02); box-shadow: 0 4px 10px rgba(34, 197, 94, 0.2); }

    /* ====================================================================== */
    /* MODAL ZOOM Y SCROLL TOP                                                */
    /* ====================================================================== */
    .btn-subir {
      position: fixed; bottom: 30px; right: 30px; background-color: var(--color-texto);
      color: var(--color-fondo); width: 45px; height: 45px; border-radius: 50%;
      border: none; display: flex; justify-content: center; align-items: center;
      font-size: 1.2rem; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      opacity: 0; transform: translateY(20px); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 90; pointer-events: none;
    }
    .btn-subir.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .btn-subir:hover { background-color: var(--color-acento); transform: scale(1.15); }

    .modal-zoom {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.9);
      display: none; justify-content: center; align-items: center; z-index: 9999;
      backdrop-filter: blur(10px); opacity: 0; transition: opacity 0.3s ease;
    }
    .modal-activo { display: flex !important; opacity: 1 !important; }
    .imagen-zoom {
      max-width: 90%; max-height: 90%; border-radius: 24px; box-shadow: 0 0 50px rgba(0,0,0,0.6);
      transform: scale(0.8); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .modal-activo .imagen-zoom { transform: scale(1); }

    /* ANIMACIONES */
    @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
    @keyframes pulsoCorazon {
      0% { box-shadow: 0 0 0 0 rgba(153, 27, 27, 0.4); }
      15% { box-shadow: 0 0 0 8px rgba(153, 27, 27, 0); }
      30% { box-shadow: 0 0 0 0 rgba(153, 27, 27, 0.4); }
      45% { box-shadow: 0 0 0 8px rgba(153, 27, 27, 0); }
      100% { box-shadow: 0 0 0 0 rgba(153, 27, 27, 0); }
    }
    @keyframes pulsoRespiracion {
      0% { box-shadow: 0 0 4px rgba(15, 118, 110, 0.2); }
      50% { box-shadow: 0 0 14px rgba(15, 118, 110, 0.6); }
      100% { box-shadow: 0 0 4px rgba(15, 118, 110, 0.2); }
    }
  </style>
</head>
<body>

  <div id="pantalla-arranque" class="pantalla-arranque">
    <h1 class="titulo-arranque">NIVANI</h1>
  </div>

  <div id="alerta-offline" class="alerta-offline">
    <i class="fas fa-wifi"></i> Conexión débil. Modo supervivencia activado.
  </div>

  <div class="interfaz-fija">
    <h1 class="titulo-marca">NIVANI</h1>
    <div class="hud-wrapper">
      <nav id="contenedor-hud" class="contenedor-hud"></nav>
      <div class="bloque-buscador">
        <i class="fas fa-search"></i>
        <input type="text" id="buscador-vivo" placeholder="Buscar flor artesanal...">
      </div>
    </div>
  </div>

  <main class="panel-catalogo" id="panel-scroll">
    <div id="contenedor-matriz" class="matriz-simetrica">
      <div id="estado-vacio" class="estado-vacio">
        <i class="fas fa-seedling"></i>
        <p>No encontramos esta flor. Explora nuestro catálogo.</p>
      </div>
    </div>
  </main>

  <button id="btn-subir" class="btn-subir"><i class="fas fa-chevron-up"></i></button>

  <div id="zoom-modal" class="modal-zoom">
    <img id="imagen-ampliada" class="imagen-zoom" src="">
  </div>

  <script>
    const ConfiguracionFirebase = {
      apiKey: "AIzaSyBqsTxi2PoFjPgvre4QqZvWHczUoO5sqU8",
      projectId: "limpiapipas-98f13",
      appId: "1:456357010113:web:c10522df7cdb2dbea1d240"
    };

    const VECTORES_WPP = {
      linea1: "59178593187",
      linea2: "59177047557"
    };

    const EstadoAplicacion = {
      datosProcesados: [],
      categoriasUnicas: [],
      filtroActivo: "TODO",
      textoBusqueda: "",
      primeraCarga: true
    };

    // MOTOR REVEAL: Intersection Observer para animar scroll
    const ObserverAnimacion = new IntersectionObserver((entradas, observador) => {
      entradas.forEach(entrada => {
        if (entrada.isIntersecting) {
          entrada.target.classList.add('revelado');
          observador.unobserve(entrada.target);
        }
      });
    }, { threshold: 0.1, rootMargin: "0px 0px -20px 0px" });

    const Utilidades = {
      quitarTildes: function(texto) {
        return (texto || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "");
      },
      vibrar: function() {
        if (navigator.vibrate) navigator.vibrate(15);
      },
      compartirNativo: async function(nombre, urlImg) {
        if (navigator.share) {
          try {
            await navigator.share({
              title: 'Nivani | ' + nombre,
              text: `¡Mira esta hermosa flor artesanal de Nivani: ${nombre}!`,
              url: window.location.href
            });
          } catch (err) { console.log('Share cancelado o fallido', err); }
        } else {
          alert("Tu navegador no soporta compartir nativo.");
        }
      },
      crearEnlaceWpp: function(nombreFlor, precioItem, numeroAsignado) {
        let base = "https://wa.me/" + numeroAsignado + "?text=";
        let p = parseInt(precioItem, 10);
        let secundario = (!isNaN(p) && p > 0) ? `. Vi que está en ${precioItem} Bs.` : ". Me gustaría cotizarla.";
        let upsell = " ¿Tienen opciones de tarjetas o chocolates para acompañarlo?";
        return base + encodeURI(`Hola Nivani, me interesa la flor artesanal: ${nombreFlor}${secundario}${upsell}`);
      },
      diseccionarNombre: function(cadenaCruda) {
        let cadena = cadenaCruda || "";
        let res = { grupo: "GENERAL", nombre: cadena.trim(), badgeNuevo: false, badgeEscaso: false };
        if (cadena.includes('-')) {
          let partes = cadena.split('-');
          res.grupo = partes[0].trim().toUpperCase();
          let nombrePuro = partes.slice(1).join(' ').trim();
          res.badgeNuevo = nombrePuro.includes('+');
          res.badgeEscaso = nombrePuro.includes('*');
          res.nombre = nombrePuro.replace('+', '').replace('*', '').trim();
        }
        return res;
      }
    };

    const MotorConexion = {
      iniciar: function() {
        firebase.initializeApp(ConfiguracionFirebase);
        let baseDatos = firebase.firestore();
        baseDatos.enablePersistence().catch(e => console.warn("Offline fallback fallido."));
        return baseDatos;
      }
    };

    const MotorUI = {
      referencias: {},
      mapearNodos: function() {
        this.referencias = {
          arranque: document.getElementById('pantalla-arranque'),
          offline: document.getElementById('alerta-offline'),
          matriz: document.getElementById('contenedor-matriz'),
          modal: document.getElementById('zoom-modal'),
          imagenAmpliada: document.getElementById('imagen-ampliada'),
          hud: document.getElementById('contenedor-hud'),
          buscador: document.getElementById('buscador-vivo'),
          estadoVacio: document.getElementById('estado-vacio'),
          panelScroll: document.getElementById('panel-scroll'),
          btnSubir: document.getElementById('btn-subir')
        };
      },
      renderizarHUD: function() {
        let cont = this.referencias.hud;
        cont.innerHTML = "";
        
        let arrFiltros = [
          { id: "TODO", texto: "Todo", icono: "fa-layer-group" }
        ];

        EstadoAplicacion.categoriasUnicas.forEach(cat => {
          if (cat !== "GENERAL" && cat !== "") arrFiltros.push({ id: cat, texto: cat, icono: "fa-seedling" });
        });

        // Agregando Filtros de Presupuesto
        arrFiltros.push({ id: "PRECIO_BAJO", texto: "< 100 Bs", icono: "fa-wallet" });
        arrFiltros.push({ id: "PRECIO_ALTO", texto: "Premium", icono: "fa-crown" });

        arrFiltros.forEach(f => {
          let btn = document.createElement('button');
          btn.className = "boton-filtro" + (EstadoAplicacion.filtroActivo === f.id ? " filtro-activo" : "");
          btn.innerHTML = `<i class="fas ${f.icono}"></i> ${f.texto}`;
          btn.dataset.categoria = f.id;
          cont.appendChild(btn);
        });
      },
      renderizarCatalogo: function() {
        let nodos = this.referencias.matriz.querySelectorAll('.tarjeta-item');
        nodos.forEach(n => ObserverAnimacion.unobserve(n)); // Limpiar observador
        nodos.forEach(n => n.remove());
        
        let filtroCat = EstadoAplicacion.filtroActivo;
        let busqueda = Utilidades.quitarTildes(EstadoAplicacion.textoBusqueda).toUpperCase();
        let visualCount = 0;
        
        EstadoAplicacion.datosProcesados.forEach((item) => {
          let pasaFiltro = false;
          let pVal = parseInt(item.precio, 10);
          
          if (filtroCat === "TODO") pasaFiltro = true;
          else if (filtroCat === "PRECIO_BAJO") pasaFiltro = (!isNaN(pVal) && pVal < 100);
          else if (filtroCat === "PRECIO_ALTO") pasaFiltro = (!isNaN(pVal) && pVal >= 100);
          else pasaFiltro = (item.grupo === filtroCat);

          let pasaTex = Utilidades.quitarTildes(item.nombre).toUpperCase().includes(busqueda);
          
          if (pasaFiltro && pasaTex) {
            let tj = document.createElement('div');
            tj.className = "tarjeta-item";
            
            let contImg = document.createElement('div');
            contImg.className = "contenedor-imagen esqueleto-shimmer";

            let img = document.createElement('img');
            img.className = "imagen-item";
            img.src = item.img || item.direccion || "";
            img.dataset.url = img.src;
            img.loading = "lazy";
            
            img.onload = function() {
              img.classList.add('imagen-cargada');
              contImg.classList.remove('esqueleto-shimmer');
            };

            contImg.appendChild(img);

            if (item.badgeNuevo) {
              let b = document.createElement('div');
              b.className = "badge-luxury badge-luxury-nuevo";
              b.innerHTML = '✦ Nueva Colección';
              contImg.appendChild(b);
            }
            if (item.badgeEscaso) {
              let b = document.createElement('div');
              b.className = "badge-luxury badge-luxury-escaso";
              b.innerHTML = '🔴 Edición Limitada';
              contImg.appendChild(b);
            }
            
            tj.appendChild(contImg);
            
            let rec = document.createElement('div');
            rec.className = "recuadro-info";
            
            let valNum = parseInt(item.precio, 10);
            let pTxt = (!isNaN(valNum) && valNum > 0) ? `${item.precio} Bs.` : "Consultar";

            rec.innerHTML = `
              <div class="cabecera-info">
                <div class="texto-grupo">${item.grupo}</div>
                <button class="btn-share" data-nombre="${item.nombre}" data-img="${img.src}" title="Sugerir como Regalo"><i class="fas fa-gift"></i></button>
              </div>
              <div class="texto-nombre">${item.nombre}</div>
              <div class="texto-precio">${pTxt}</div>
              <div class="contenedor-wpp-dual">
                <a href="${Utilidades.crearEnlaceWpp(item.nombre, item.precio, VECTORES_WPP.linea1)}" class="btn-wpp-sm click-vibra" target="_blank"><i class="fab fa-whatsapp"></i> VIP 1</a>
                <a href="${Utilidades.crearEnlaceWpp(item.nombre, item.precio, VECTORES_WPP.linea2)}" class="btn-wpp-sm click-vibra" target="_blank"><i class="fab fa-whatsapp"></i> VIP 2</a>
              </div>
            `;
            
            // Asignar evento de compartir nativo
            rec.querySelector('.btn-share').addEventListener('click', function(e) {
              Utilidades.vibrar();
              Utilidades.compartirNativo(this.dataset.nombre, this.dataset.img);
            });

            tj.appendChild(rec);
            this.referencias.matriz.appendChild(tj);
            ObserverAnimacion.observe(tj); // Iniciar lazy render animado
            visualCount++;
          }
        });
        
        this.referencias.estadoVacio.style.display = (visualCount === 0) ? "flex" : "none";

        if (EstadoAplicacion.primeraCarga) {
          setTimeout(() => {
            if(this.referencias.arranque) this.referencias.arranque.classList.add('pantalla-oculta');
          }, 300);
          EstadoAplicacion.primeraCarga = false;
        }
      },
      abrirZoom: function(url) {
        Utilidades.vibrar();
        this.referencias.imagenAmpliada.src = url;
        this.referencias.modal.classList.add('modal-activo');
      },
      cerrarZoom: function() {
        this.referencias.modal.classList.remove('modal-activo');
      }
    };

    const MotorEventos = {
      escucharDOM: function() {
        let r = MotorUI.referencias;
        let timer = null;
        
        r.buscador.addEventListener('input', e => {
          EstadoAplicacion.filtroActivo = "TODO";
          MotorUI.renderizarHUD();
          clearTimeout(timer);
          timer = setTimeout(() => {
            EstadoAplicacion.textoBusqueda = e.target.value;
            MotorUI.renderizarCatalogo();
          }, 300);
        });

        r.hud.addEventListener('click', e => {
          let target = e.target.closest('.boton-filtro');
          if (target) {
            Utilidades.vibrar();
            EstadoAplicacion.filtroActivo = target.dataset.categoria;
            MotorUI.renderizarHUD();
            MotorUI.renderizarCatalogo();
          }
        });
        
        r.matriz.addEventListener('click', e => {
          if (e.target.classList.contains('imagen-item')) MotorUI.abrirZoom(e.target.dataset.url);
          if (e.target.closest('.click-vibra')) Utilidades.vibrar();
        });
        
        r.modal.addEventListener('click', () => MotorUI.cerrarZoom());

        r.panelScroll.addEventListener('scroll', () => {
          if (r.panelScroll.scrollTop > 300) r.btnSubir.classList.add('visible');
          else r.btnSubir.classList.remove('visible');
        });

        r.btnSubir.addEventListener('click', () => {
          Utilidades.vibrar();
          r.panelScroll.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // CONTROL OFFLINE
        window.addEventListener('offline', () => r.offline.classList.add('visible'));
        window.addEventListener('online', () => r.offline.classList.remove('visible'));
      },
      sincronizarFirebase: function(db) {
        db.collection("flores").onSnapshot(snapshot => {
          let arr = [];
          let cats = new Set();
          
          snapshot.docs.forEach(doc => {
            let d = doc.data();
            let p = Utilidades.diseccionarNombre(d.nombre);
            cats.add(p.grupo);
            
            arr.push({
              id: doc.id, grupo: p.grupo, nombre: p.nombre,
              badgeNuevo: p.badgeNuevo, badgeEscaso: p.badgeEscaso,
              img: d.img || d.direccion, precio: d.precio
            });
          });
          
          EstadoAplicacion.datosProcesados = arr;
          EstadoAplicacion.categoriasUnicas = Array.from(cats).sort();
          
          MotorUI.renderizarHUD();
          MotorUI.renderizarCatalogo();
        });
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      let db = MotorConexion.iniciar();
      MotorUI.mapearNodos();
      MotorEventos.escucharDOM();
      MotorEventos.sincronizarFirebase(db);
      if (!navigator.onLine) MotorUI.referencias.offline.classList.add('visible');
    });
  </script>
</body>
</html>
