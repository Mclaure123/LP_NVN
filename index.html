<!DOCTYPE html>
<html lang="es">
<head>
  <!-- ====================================================================== -->
  <!-- 1_METADATOS_Y_FUENTES_LUXURY                                           -->
  <!-- ====================================================================== -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nivani | Atelier de Flores en Chenilla</title>
  
  <!-- Iconos y Tipografías de Prestigio -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- SDK de Firebase Compat para Conexión Segura -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  
  <style>
    /* ====================================================================== */
    /* 2_ESTILOS_CSS_VARIABLES (ESTÉTICA DARK EXCLUSIVA)                      */
    /* ====================================================================== */
    :root {
      /* Paleta Ónice y Terracota Premium de la Captura */
      --color-fondo: #0a0a0b;
      --color-tarjeta: #131315;
      --color-recuadro: #18181b;
      --color-acento: #eba38a; /* Exclusivo Durazno Terracota Pastel */
      --color-dorado-mudo: #c5a8a0;
      --color-texto: #f5f5f5;
      --color-texto-sec: #9a9a9f;
      
      --color-wpp: #22c55e;
      --color-wpp-fondo: rgba(34, 197, 94, 0.1);
      --color-wpp-borde: rgba(34, 197, 94, 0.2);
      --sombra-premium: 0 15px 35px rgba(0,0,0,0.6);
      --radio-borde: 20px;
      --radio-borde-hud: 30px;
      
      --fuente-ui: 'Inter', sans-serif;
      --fuente-lujo: 'Cinzel', serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: radial-gradient(circle at top center, #1c1c1f 0%, var(--color-fondo) 100%);
      background-attachment: fixed;
      color: var(--color-texto);
      font-family: var(--fuente-ui);
      width: 100%; height: 100vh;
      overflow-x: hidden; overflow-y: hidden; display: flex; flex-direction: column;
    }

    /* TELÓN DE ARRANQUE EXCLUSIVO */
    .pantalla-arranque {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: var(--color-fondo); z-index: 99999;
      display: flex; justify-content: center; align-items: center;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    .pantalla-oculta { opacity: 0; visibility: hidden; }
    
    .titulo-arranque {
      font-family: var(--fuente-lujo); font-weight: 400; letter-spacing: 20px;
      font-size: 3rem; text-transform: uppercase; color: var(--color-texto);
      margin-right: -20px; animation: pulsoArranque 2.5s infinite ease-in-out;
    }
    @keyframes pulsoArranque {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(1.02); }
    }

    .alerta-offline {
      position: fixed; bottom: 0; left: 0; width: 100%;
      background: #b91c1c; color: white; text-align: center;
      padding: 10px; font-size: 0.85rem; font-weight: 600;
      transform: translateY(100%); transition: transform 0.4s ease; z-index: 999;
    }
    .alerta-offline.visible { transform: translateY(0); }

    /* TOAST MENSAJES PERSONALIZADO */
    .toast-premium {
      position: fixed; bottom: 30px; left: 50%; transform: translate(-50%, 100%);
      background: rgba(25, 25, 27, 0.95); border: 1px solid rgba(235, 220, 213, 0.2);
      padding: 12px 30px; border-radius: 30px; z-index: 10000; font-size: 0.85rem;
      font-weight: 600; color: var(--color-acento); letter-spacing: 1px;
      backdrop-filter: blur(10px); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5); pointer-events: none;
    }
    .toast-premium.visible { transform: translate(-50%, 0); }

    /* ====================================================================== */
    /* INTERFAZ FLOTANTE - HUD DE NAVEGACIÓN                                  */
    /* ====================================================================== */
    .interfaz-fija {
      position: sticky; top: 0; z-index: 100;
      background-color: rgba(10, 10, 11, 0.92);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      padding: 25px 40px 20px 40px;
      display: flex; flex-direction: column; align-items: center; flex-shrink: 0;
      transition: all 0.3s ease;
    }

    .titulo-marca {
      font-family: var(--fuente-lujo); font-weight: 400; letter-spacing: 25px;
      font-size: 2.8rem; margin-bottom: 20px; text-transform: uppercase;
      color: var(--color-texto); text-shadow: 0 4px 20px rgba(0,0,0,0.5); margin-right: -25px;
      text-align: center; transition: all 0.3s ease;
    }

    /* Ajustes dinámicos para teléfonos móviles */
    @media (max-width: 640px) {
      .titulo-marca {
        font-size: 1.8rem;
        letter-spacing: 12px;
        margin-right: -12px;
        margin-bottom: 12px;
      }
      .interfaz-fija {
        padding: 15px 15px 10px 15px;
      }
    }

    .hud-wrapper {
      display: flex; justify-content: space-between; align-items: center;
      width: 100%; max-width: 1200px; gap: 20px; flex-wrap: wrap;
    }

    .contenedor-hud { display: flex; gap: 8px; flex-wrap: wrap; flex: 1; align-items: center; }

    .boton-filtro {
      padding: 10px 20px; border-radius: var(--radio-borde-hud);
      border: 1px solid rgba(255, 255, 255, 0.1); background-color: transparent;
      color: var(--color-texto-sec); font-weight: 600; font-size: 0.75rem;
      cursor: pointer; transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
      text-transform: uppercase; display: flex; align-items: center; gap: 8px;
      letter-spacing: 1px;
    }
    .boton-filtro:hover { border-color: rgba(255, 255, 255, 0.25); color: var(--color-texto); }
    .filtro-activo { 
      background-color: var(--color-acento) !important; 
      color: var(--color-fondo) !important; 
      border-color: var(--color-acento) !important;
      box-shadow: 0 4px 15px rgba(235, 220, 213, 0.2); 
    }

    .bloque-buscador { width: 100%; max-width: 280px; position: relative; }
    .bloque-buscador input {
      width: 100%; padding: 10px 15px 10px 40px; border-radius: var(--radio-borde-hud);
      border: 1px solid rgba(255, 255, 255, 0.1); background-color: rgba(255, 255, 255, 0.03);
      color: var(--color-texto); font-size: 0.85rem; outline: none; transition: all 0.3s ease;
      letter-spacing: 0.5px;
    }
    .bloque-buscador input:focus { border-color: rgba(255,255,255,0.3); background-color: rgba(255, 255, 255, 0.06); }
    .bloque-buscador i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--color-texto-sec); font-size: 0.85rem; }

    /* BOTÓN PEDIDO REFORMADO (MINIMALISTA) */
    .btn-pedido {
      background-color: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 10px 20px; border-radius: var(--radio-borde-hud); color: var(--color-texto);
      font-weight: 600; font-size: 0.75rem; letter-spacing: 1.5px; display: flex; align-items: center;
      gap: 10px; cursor: pointer; transition: all 0.3s; text-transform: uppercase;
    }
    .btn-pedido:hover { background-color: var(--color-acento); color: var(--color-fondo); border-color: var(--color-acento); }
    .pedido-badge {
      background-color: var(--color-acento); color: var(--color-fondo);
      width: 18px; height: 18px; border-radius: 50%; display: flex;
      justify-content: center; align-items: center; font-size: 0.65rem; font-weight: 700;
      transition: transform 0.3s ease;
    }
    .badge-pop { transform: scale(1.3); }

    /* ====================================================================== */
    /* MATRIZ DE CATÁLOGO                                                     */
    /* ====================================================================== */
    .panel-catalogo { flex-grow: 1; overflow-y: auto; padding: 25px 40px 80px 40px; scroll-behavior: smooth; }
    .panel-catalogo::-webkit-scrollbar { width: 5px; }
    .panel-catalogo::-webkit-scrollbar-thumb { background-color: rgba(255, 255, 255, 0.05); border-radius: 5px; }

    .matriz-simetrica {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px; max-width: 1200px; margin: 0 auto; position: relative;
    }

    /* Doble columna limpia en móviles */
    @media (max-width: 640px) {
      .matriz-simetrica {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }
      .panel-catalogo {
        padding: 15px 12px 80px 12px;
      }
    }

    .estado-vacio {
      grid-column: 1 / -1; text-align: center; padding: 100px 20px;
      display: none; flex-direction: column; align-items: center; animation: fadeIn 0.5s ease-out;
    }
    .estado-vacio i { font-size: 3rem; color: var(--color-dorado-mudo); opacity: 0.5; margin-bottom: 20px; }
    .estado-vacio p { font-size: 1rem; color: var(--color-texto-sec); font-weight: 300; letter-spacing: 1px; }

    /* TARJETA DE LUJO AJUSTADA */
    .tarjeta-item {
      background-color: var(--color-tarjeta); border-radius: var(--radio-borde); padding: 10px;
      box-shadow: var(--sombra-premium); transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), box-shadow 0.4s ease;
      display: flex; flex-direction: column; position: relative;
      content-visibility: auto; contain-intrinsic-size: 380px;
      opacity: 0; transform: translateY(30px);
    }
    .tarjeta-item.revelado { opacity: 1; transform: translateY(0); }
    .tarjeta-item:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }

    /* CONTENEDOR FOTO COLOR DURAZNO PASTEL DE LA CAPTURA */
    .contenedor-imagen {
      position: relative; width: 100%; height: 180px; border-radius: 14px; overflow: hidden;
      background-color: var(--color-acento);
    }
    
    /* CARGADOR ATELIER CON HUELLA EN CHENILLA */
    .cargador-atelier {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      gap: 8px; background-color: var(--color-recuadro); z-index: 5;
    }
    .icono-huella-pulso {
      font-size: 1.8rem; color: var(--color-acento);
      animation: pulsoRespiracion 2s infinite ease-in-out;
    }
    .texto-espera-narrativo {
      font-size: 0.55rem; text-transform: uppercase; letter-spacing: 1px;
      font-weight: 600; color: var(--color-texto-sec); text-align: center;
      padding: 0 10px;
    }

    .imagen-item {
      width: 100%; height: 100%; object-fit: cover; cursor: zoom-in;
      opacity: 0; transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .imagen-cargada { opacity: 1; }
    .tarjeta-item:hover .imagen-cargada { transform: scale(1.05); }

    /* CÁPSULAS FLOTANTES DE EDICIÓN EXCLUSIVA */
    .badge-luxury {
      position: absolute; bottom: 8px; left: 8px; padding: 4px 10px;
      border-radius: 20px; font-size: 0.6rem; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; z-index: 10; backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px); display: flex; align-items: center; gap: 5px;
    }
    .badge-luxury-nuevo { background: rgba(255, 255, 255, 0.85); color: #000; border: 1px solid rgba(255, 255, 255, 0.3); animation: pulsoRespiracion 3s infinite ease-in-out; }
    .badge-luxury-escaso { background: rgba(0, 0, 0, 0.65); color: #fff; border: 1px solid rgba(255, 255, 255, 0.1); animation: pulsoCorazon 1.8s infinite; }

    /* RECUADRO DE INTEGRACIÓN MATE */
    .recuadro-info {
      background: var(--color-recuadro); border: 1px solid rgba(197, 168, 160, 0.08); border-radius: 18px;
      padding: 12px; margin-top: 10px; display: flex; flex-direction: column; flex-grow: 1; gap: 6px;
      min-height: 105px; /* Altura optimizada y simétrica al remover la categoría */
    }
    
    .cabecera-info { display: flex; justify-content: flex-end; align-items: center; }
    
    .btn-favorito { background: transparent; border: none; color: var(--color-texto-sec); cursor: pointer; transition: all 0.2s; font-size: 0.85rem; }
    .btn-favorito:hover { color: var(--color-acento); }
    .btn-share { background: transparent; border: none; color: var(--color-texto-sec); cursor: pointer; transition: all 0.2s; font-size: 0.85rem; }
    .btn-share:hover { color: var(--color-acento); }
    .favorito-activo { color: var(--color-acento) !important; animation: popIcon 0.3s ease; }

    /* EXQUISITO REDISEÑO EDITORIAL COMPACTO (1 SOLA LÍNEA SIN ITÁLICAS) */
    .texto-nombre {
      font-family: var(--fuente-lujo); 
      font-weight: 400; 
      font-size: 1.1rem;
      color: var(--color-texto); 
      line-height: 1.2; 
      letter-spacing: 2px; 
      text-transform: uppercase; 
      margin-top: 2px;
      
      /* Restricción Estricta de 1 Línea con Elipsis */
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @media (max-width: 640px) {
      .texto-nombre {
        font-size: 0.95rem;
        letter-spacing: 1px;
      }
    }

    .texto-precio { font-weight: 500; color: var(--color-texto); font-size: 1.05rem; margin-top: 2px; }

    /* BOTÓN AÑADIR SIMÉTRICO MAGNÉTICO */
    .btn-agregar-carrito {
      width: 100%; background: transparent; border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--color-texto-sec); text-transform: uppercase; font-size: 0.7rem;
      font-weight: 600; letter-spacing: 1.5px; padding: 10px 0; border-radius: 8px;
      cursor: pointer; transition: all 0.3s; 
      margin-top: auto; 
    }
    .btn-agregar-carrito:hover { background: var(--color-texto); color: var(--color-fondo); border-color: var(--color-texto); }

    /* ====================================================================== */
    /* PANEL DE PEDIDO LATERAL Y OVERLAY                                      */
    /* ====================================================================== */
    .drawer-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0, 0, 0, 0.6); 
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.5s ease;
    }
    .drawer-overlay.activo { opacity: 1; visibility: visible; }

    .drawer-pedido {
      position: fixed; top: 0; right: 0; width: 100%; max-width: 420px; height: 100%;
      background: #111112; border-left: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: -10px 0 40px rgba(0,0,0,0.8); z-index: 1001;
      transform: translateX(100%); transition: transform 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
      display: flex; flex-direction: column; padding: 30px;
    }
    .drawer-pedido.activo { transform: translateX(0); }

    @media (max-width: 640px) {
      .drawer-pedido {
        padding: 20px 15px;
      }
    }

    .cabecera-drawer { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-shrink: 0; }
    .titulo-drawer { font-family: var(--fuente-lujo); font-size: 1.5rem; letter-spacing: 5px; text-transform: uppercase; }
    .btn-cerrar-drawer { background: transparent; border: none; color: var(--color-texto-sec); font-size: 1.2rem; cursor: pointer; transition: color 0.2s; }
    .btn-cerrar-drawer:hover { color: var(--color-texto); }

    /* CONTENIDO SCROLLEABLE */
    .lista-pedido { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; padding-right: 5px; }
    .lista-pedido::-webkit-scrollbar { width: 3px; }
    .lista-pedido::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.05); }

    #drawer-contenido {
      flex-grow: 1;
      overflow-y: auto;
      padding-right: 4px;
    }
    #drawer-contenido::-webkit-scrollbar {
      width: 4px;
    }
    #drawer-contenido::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 4px;
    }

    .item-pedido-card {
      display: flex; gap: 15px; align-items: center; background: rgba(255,255,255,0.02);
      padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.03);
    }
    .img-pedido-min { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; background-color: var(--color-acento); }
    .info-pedido-min { flex-grow: 1; display: flex; flex-direction: column; gap: 2px; }
    .nom-pedido-min { font-family: var(--fuente-lujo); font-size: 0.9rem; letter-spacing: 1px; text-transform: uppercase; }
    .pre-pedido-min { font-size: 0.8rem; color: var(--color-texto-sec); }

    .controles-pedido-min { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.04); padding: 4px 10px; border-radius: 20px; }
    .btn-cant-min { background: transparent; border: none; color: var(--color-texto); cursor: pointer; font-size: 0.8rem; }
    .num-cant-min { font-size: 0.85rem; font-weight: bold; width: 15px; text-align: center; }

    .btn-borrar-min { background: transparent; border: none; color: #ef4444; cursor: pointer; font-size: 0.9rem; padding: 5px; opacity: 0.6; transition: opacity 0.2s; }
    .btn-borrar-min:hover { opacity: 1; }

    /* PIE DEL DRAWER */
    .pie-drawer {
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding-top: 20px;
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
      flex-shrink: 0;
      background: #111112;
    }
    .fila-total { display: flex; justify-content: space-between; font-size: 1.1rem; font-weight: 600; }
    .txt-total-val { color: var(--color-acento); font-size: 1.2rem; }
    
    .btn-enviar-wpp {
      width: 100%; background-color: var(--color-wpp); color: white; border: none;
      padding: 15px; border-radius: 12px; font-weight: 700; font-size: 0.85rem;
      letter-spacing: 2px; text-transform: uppercase; cursor: pointer; display: flex;
      justify-content: center; align-items: center; gap: 10px; transition: all 0.3s;
    }
    .btn-enviar-wpp:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(34, 197, 150, 0.3); }

    /* SCROLL TOP */
    .btn-subir {
      position: fixed; bottom: 30px; right: 30px; background-color: var(--color-texto);
      color: var(--color-fondo); width: 45px; height: 45px; border-radius: 50%;
      border: none; display: flex; justify-content: center; align-items: center;
      font-size: 1.2rem; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      opacity: 0; transform: translateY(20px); transition: all 0.3s; z-index: 90; pointer-events: none;
    }
    .btn-subir.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }

    /* ZOOM MODAL */
    .modal-zoom {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.95);
      display: none; justify-content: center; align-items: center; z-index: 9999;
      backdrop-filter: blur(15px); opacity: 0; transition: opacity 0.3s ease;
    }
    .modal-activo { display: flex !important; opacity: 1 !important; }
    .imagen-zoom { max-width: 90%; max-height: 90%; border-radius: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.8); transform: scale(0.8); transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); }
    .modal-activo .imagen-zoom { transform: scale(1); }

    /* TEXTURAS DEL SIMULADOR */
    .textura-terciopelo {
      background: radial-gradient(circle at 50% 30%, #5c0620 0%, #3b0212 70%, #1e0008 100%);
      box-shadow: inset 0 0 35px rgba(0, 0, 0, 0.85), 0 10px 25px rgba(0, 0, 0, 0.45);
      border: 1.5px solid rgba(212, 163, 115, 0.25);
    }
    .textura-coreano {
      background: linear-gradient(135deg, #fce7f3 0%, #fbcfe8 100%);
      box-shadow: inset 0 0 25px rgba(219, 39, 119, 0.15), 0 8px 20px rgba(0, 0, 0, 0.1);
      border-radius: 30px 30px 40px 40px;
    }
    .textura-kraft {
      background: linear-gradient(150deg, #d2b48c 0%, #b59068 50%, #8b653f 100%);
      box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.25), 0 8px 20px rgba(0, 0, 0, 0.15);
      border-radius: 12px;
    }

    .tulipan-chenilla {
      background: radial-gradient(circle at 35% 35%, #f43f5e 15%, #be123c 65%, #6c041d 100%);
      box-shadow: 0 0 12px rgba(244, 63, 94, 0.5), inset 0 0 6px rgba(255, 255, 255, 0.3);
      filter: drop-shadow(0 0 1px rgba(244, 63, 94, 0.8));
      border-radius: 50% 50% 50% 50% / 60% 60 40% 40%;
      position: absolute;
      transform-origin: bottom center;
    }

    /* ESTILO PREMIUM PARA EL SELECTOR DE PLANTILLAS */
    .chip-plantilla {
      flex-shrink: 0;
      padding: 6px 14px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      color: var(--color-texto-sec);
      font-size: 0.7rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
    }
    .chip-plantilla:hover {
      background: rgba(255, 255, 255, 0.08);
      color: var(--color-texto);
      border-color: rgba(255, 255, 255, 0.2);
    }
    .chip-plantilla-activo {
      background: var(--color-acento) !important;
      color: var(--color-fondo) !important;
      border-color: var(--color-acento) !important;
      font-weight: 600;
    }

    /* Ocultar barra de scroll en navegadores */
    .scrollbar-none::-webkit-scrollbar { display: none; }
    .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }

    @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }

    // Frases de Espera Aleatorias
    const FRASES_ESPERA = [

      { id: 8, cat: "Disculpa 🥺", texto: "A veces faltan palabras, pero que estas flores eternas hablen por mí. Lo siento mucho." },
      { id: 9, cat: "Atelier 🎨", texto: "Para alguien con alma de artista, un detalle moldeado con la más alta dedicación y delicadeza." },
      { id: 10, cat: "Mamá 💖", texto: "Para la flor más hermosa y fuerte de mi jardín de vida. Te amo con todo mi corazón, mamá." }

    const EstadoAplicacion = {

    // Animación de entrada de elementos
    const ObserverAnimacion = new IntersectionObserver((entradas, observador) => {
      entradas.forEach(entrada => {
        if (entrada.isIntersecting) {
          entrada.target.classList.add('revelado');
          observador.unobserve(entrada.target);
        }
      });
    }, { threshold: 0.05, rootMargin: "0px 0px -10px 0px" });

    const Utilidades = {
      quitarTildes: function(texto) {
        return (texto || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "");
      },
      vibrar: function() {
        if (navigator.vibrate) navigator.vibrate(15);
      },
      obtenerFraseEsperaAleatoria: function() {
        const index = Math.floor(Math.random() * FRASES_ESPERA.length);
        return FRASES_ESPERA[index];
      },
      mostrarToast: function(mensaje, esExitoso = true) {
        const container = document.getElementById('toast-contenedor');
        const toast = document.createElement('div');
        toast.className = "pointer-events-auto bg-[var(--color-tarjeta)] border border-stone-200/10 text-[var(--color-texto)] px-4 py-3 rounded-xl shadow-2xl flex items-center gap-3 max-w-xs transition-all duration-300 opacity-0 transform translate-y-[-10px]";
        
        let icono = esExitoso ? '<i class="fas fa-check-circle text-emerald-500"></i>' : '<i class="fas fa-exclamation-circle text-amber-500"></i>';
        toast.innerHTML = `${icono} <span class="text-xs font-semibold">${mensaje}</span>`;
        container.appendChild(toast);

        setTimeout(() => {
          toast.classList.remove('opacity-0', 'translate-y-[-10px]');
          toast.classList.add('opacity-100', 'translate-y-0');
        }, 50);

        setTimeout(() => {
          toast.classList.add('opacity-0', 'translate-y-[-10px]');
          setTimeout(() => toast.remove(), 300);
        }, 3500);
      },
      ejecutarEfectoVuelo: function(event) {
        const rectOrigen = event.currentTarget.getBoundingClientRect();
        const rectDestino = document.getElementById('icono-bolsa-compras').getBoundingClientRect();

        const particula = document.createElement('div');
        particula.className = "fixed pointer-events-none z-[9999] transition-all duration-700 ease-out text-lg select-none";
        particula.innerHTML = "🌸";
        particula.style.left = `${rectOrigen.left + rectOrigen.width/2}px`;
        particula.style.top = `${rectOrigen.top}px`;
        document.body.appendChild(particula);

        setTimeout(() => {
          particula.style.left = `${rectDestino.left}px`;
          particula.style.top = `${rectDestino.top}px`;
          particula.style.transform = "scale(0.3) rotate(360deg)";
          particula.style.opacity = "0.3";
        }, 50);

        setTimeout(() => {
          particula.remove();
          const bagIcon = document.getElementById('icono-bolsa-compras');
          bagIcon.classList.add('scale-125', 'text-emerald-500');
          setTimeout(() => bagIcon.classList.remove('scale-125', 'text-emerald-500'), 300);
        }, 750);
      },
      crearEnlaceWppIndividual: function(nombreFlor, precioItem, numeroAsignado) {
        let base = "https://wa.me/" + numeroAsignado + "?text=";
        let p = parseInt(precioItem, 10);
        let sec = (!isNaN(p) && p > 0) ? `. Vi que está en ${precioItem} Bs.` : ". Me gustaría cotizarla.";
        let upsell = " ¿Tienen opciones de tarjetas para acompañarlo?";
        return base + encodeURI(`Hola Nivani, me interesa la flor de Atelier: ${nombreFlor}${sec}${upsell}`);
      },
      diseccionarNombre: function(cadenaCruda) {
        let cadena = cadenaCruda || "";
        let res = { grupo: "GENERAL", nombre: cadena.trim(), badgeNuevo: false, badgeEscaso: false };
        let indiceSeparador = cadena.match(/[-_]/);
        
        if (indiceSeparador) {
          let pos = indiceSeparador.index;
          res.grupo = cadena.substring(0, pos).trim().toUpperCase();
          let nombrePuro = cadena.substring(pos + 1).trim();
          
          res.badgeNuevo = nombrePuro.includes('+');
          res.badgeEscaso = nombrePuro.includes('*');
          res.nombre = nombrePuro.replace('+', '').replace('*', '').trim();
        } else {
          res.badgeNuevo = cadena.includes('+');
          res.badgeEscaso = cadena.includes('*');
          res.nombre = cadena.replace('+', '').replace('*', '').trim();
        }
        return res;
      },
      compartirNativo: function(nombreFlor) {
        const textoCompartir = `¡Hola! Estaba viendo el Atelier de Nivani y me encantó esta hermosa flor hecha a mano: "${nombreFlor}". Es un hermoso detalle eterno. 🌸✨`;
        
        if (navigator.share) {
          navigator.share({
            title: 'Sugerencia de Regalo - Nivani',
            text: textoCompartir,
            url: window.location.href
          }).then(() => {
            Utilidades.mostrarToast("¡Sugerencia compartida!");
          }).catch(() => {
            Utilidades.copiarTexto(textoCompartir);
          });
        } else {
          Utilidades.copiarTexto(textoCompartir);
        }
      },
      copiarTexto: function(texto) {
        // Copiado seguro y compatible con iframe
        const inputAux = document.createElement("input");
        inputAux.setAttribute("value", texto);
        document.body.appendChild(inputAux);
        inputAux.select();
        inputAux.setSelectionRange(0, 99999);
        try {
          document.execCommand("copy");
          Utilidades.mostrarToast("¡Sugerencia copiada! Envíala por WhatsApp a quien quieras 🎁");
        } catch (e) {
          console.error("No se pudo copiar el texto", e);
        }
        document.body.removeChild(inputAux);
      }
    };

      renderizarHUD: function() {
        let cont = this.referencias.hud;
        cont.innerHTML = "";
        
        let arrFiltros = [
          { id: "TODO", texto: "Todo", icono: "fa-layer-group" },
          { id: "FAVORITOS", texto: "Favoritos", icono: "fa-heart" }
        ];
        
        EstadoAplicacion.categoriasUnicas.forEach(cat => {
          if (cat !== "GENERAL" && cat !== "") arrFiltros.push({ id: cat, texto: cat, icono: "fa-seedling" });
        });
        arrFiltros.push({ id: "PRECIO_BAJO", texto: "< 100 Bs", icono: "fa-wallet" });
        arrFiltros.push({ id: "PRECIO_ALTO", texto: "Premium", icono: "fa-crown" });

        arrFiltros.forEach(f => {
          let btn = document.createElement('button');
          btn.className = "boton-filtro" + (EstadoAplicacion.filtroActivo === f.id ? " filtro-activo" : "");
          btn.innerHTML = `<i class="fas ${f.icono}"></i> ${f.texto}`;
          btn.dataset.categoria = f.id;
          cont.appendChild(btn);
        });
      },
      renderizarCatalogo: function() {
        let tarjetasPrevias = this.referencias.matriz.querySelectorAll('.tarjeta-item');
        tarjetasPrevias.forEach(n => { ObserverAnimacion.unobserve(n); n.remove(); });
        
        let filtroCat = EstadoAplicacion.filtroActivo;
        let busqueda = Utilidades.quitarTildes(EstadoAplicacion.textoBusqueda).toUpperCase();
        let contadorVisual = 0;
        
        EstadoAplicacion.datosProcesados.forEach((item) => {
          let pasaFiltro = false;
          let pVal = parseInt(item.precio, 10);
          
          if (filtroCat === "TODO") pasaFiltro = true;
          else if (filtroCat === "FAVORITOS") pasaFiltro = EstadoAplicacion.favoritos.includes(item.id);
          else if (filtroCat === "PRECIO_BAJO") pasaFiltro = (!isNaN(pVal) && pVal < 100);
          else if (filtroCat === "PRECIO_ALTO") pasaFiltro = (!isNaN(pVal) && pVal >= 100);
          else pasaFiltro = (item.grupo === filtroCat);

          let pasaTex = Utilidades.quitarTildes(item.nombre).toUpperCase().includes(busqueda);
          
          if (pasaFiltro && pasaTex) {
            let tarjeta = document.createElement('div');
            tarjeta.className = "tarjeta-item";
            
            let contImg = document.createElement('div');
            contImg.className = "contenedor-imagen";

            // CARGADOR ATELIER
            let cargador = document.createElement('div');
            cargador.className = "cargador-atelier";
            cargador.innerHTML = `
              <i class="fas fa-fingerprint icono-huella-pulso"></i>
              <span class="texto-espera-narrativo">${Utilidades.obtenerFraseEsperaAleatoria()}</span>
            `;
            contImg.appendChild(cargador);

            let img = document.createElement('img');
            img.className = "imagen-item";
            img.src = item.img || item.direccion || "";
            img.dataset.url = img.src;
            
            img.onload = function() {
              img.classList.add('imagen-cargada');
              cargador.remove();
            };
            contImg.appendChild(img);

            if (item.badgeNuevo) {
              let b = document.createElement('div'); b.className = "badge-luxury badge-luxury-nuevo";
              b.innerHTML = '✦ Nuevo'; contImg.appendChild(b);
            }
            if (item.badgeEscaso) {
              let b = document.createElement('div'); b.className = "badge-luxury badge-luxury-escaso";
              b.innerHTML = '🔴 Limitado'; contImg.appendChild(b);
            }
            tarjeta.appendChild(contImg);
            
            let recuadro = document.createElement('div');
            recuadro.className = "recuadro-info";
            
            let valNum = parseInt(item.precio, 10);
            let pTxt = (!isNaN(valNum) && valNum > 0) ? `${item.precio} Bs.` : "Consultar";

            let esFav = EstadoAplicacion.favoritos.includes(item.id);
            let claseCorazon = esFav ? "fas fa-heart text-pink-500" : "far fa-heart";

            // Se elimina la visualización de la categoría para un acabado minimalista
            recuadro.innerHTML = `
              <div class="cabecera-info select-none flex justify-end">
                <div class="flex items-center gap-3">
                  <button class="btn-favorito" data-id="${item.id}"><i class="${claseCorazon}"></i></button>
                  <button class="btn-share" data-nombre="${item.nombre}" title="Sugerir como Regalo"><i class="fas fa-gift text-stone-400 hover:text-[var(--color-acento)] transition-colors"></i></button>
                </div>
              </div>
              <div class="texto-nombre">${item.nombre}</div>
              <div class="texto-precio select-none">${pTxt}</div>
              <button class="btn-agregar-carrito w-full" data-id="${item.id}">Añadir al Pedido</button>
            `;
            
            recuadro.querySelector('.btn-share').addEventListener('click', function(e) {
              Utilidades.vibrar(); 
              Utilidades.compartirNativo(this.dataset.nombre);
            });

            recuadro.querySelector('.btn-favorito').addEventListener('click', function(e) {
              Utilidades.vibrar();
              MotorEventos.alternarFavorito(item.id);
            });

            recuadro.querySelector('.btn-agregar-carrito').addEventListener('click', function(e) {
              Utilidades.vibrar();
              Utilidades.ejecutarEfectoVuelo(e);
              MotorEventos.agregarAlCarrito(item);
            });

            tarjeta.appendChild(recuadro);
            this.referencias.matriz.appendChild(tarjeta);
            ObserverAnimacion.observe(tarjeta); 
            contadorVisual++;
          }
        });
        
        this.referencias.estadoVacio.style.display = (contadorVisual === 0) ? "flex" : "none";

        if (EstadoAplicacion.primeraCarga) {
          setTimeout(() => {
            if(this.referencias.arranque) this.referencias.arranque.classList.add('pantalla-oculta');
          }, 300);
          EstadoAplicacion.primeraCarga = false;
        }
      },
      abrirZoom: function(url) {
        Utilidades.vibrar(); this.referencias.imagenAmpliada.src = url;
        this.referencias.modal.classList.add('modal-activo');
      },
      cerrarZoom: function() { this.referencias.modal.classList.remove('modal-activo'); },
      
      // CARRETE Y RENDERS DE CARRO DE COMPRAS
      actualizarContadoresPedido: function() {
        const count = EstadoAplicacion.carrito.reduce((acc, obj) => acc + obj.cantidad, 0);
        this.referencias.contadorPedido.innerText = count;
        this.referencias.contadorPedido.style.transform = "scale(1.3)";
        setTimeout(() => this.referencias.contadorPedido.style.transform = "scale(1)", 200);
      },
      renderizarCarrito: function() {
        let lista = this.referencias.carritoLista;
        lista.innerHTML = "";
        
        if (EstadoAplicacion.carrito.length === 0) {
          this.referencias.carritoVacioMsg.style.display = "flex";
        } else {
          this.referencias.carritoVacioMsg.style.display = "none";
          
          EstadoAplicacion.carrito.forEach((item, index) => {
            let div = document.createElement('div');
            div.className = "flex items-center justify-between p-3 bg-[var(--color-recuadro)] border border-stone-200/10 rounded-2xl gap-3";
            
            let imgHTML = `<div class="w-12 h-12 rounded-xl bg-amber-500/10 flex items-center justify-center text-lg"><i class="fas fa-magic text-[var(--color-acento)]"></i></div>`;
            if (item.img) {
              imgHTML = `<img src="${item.img}" class="w-12 h-12 rounded-xl object-cover">`;
            }

            div.innerHTML = `
              <div class="flex items-center gap-3">
                ${imgHTML}
                <div>
                  <h4 class="text-xs font-bold text-[var(--color-texto)] leading-tight">${item.nombre}</h4>
                  <p class="text-[10px] text-stone-400 font-semibold uppercase mt-0.5">${item.precio} Bs.</p>
                </div>
              </div>
              <div class="flex items-center gap-2">
                <button onclick="MotorEventos.cambiarCantidadCarrito(${index}, -1)" class="w-6 h-6 rounded-lg bg-stone-100 dark:bg-stone-800 text-[var(--color-texto)] flex items-center justify-center text-xs font-bold">-</button>
                <span class="text-xs font-bold w-4 text-center">${item.cantidad}</span>
                <button onclick="MotorEventos.cambiarCantidadCarrito(${index}, 1)" class="w-6 h-6 rounded-lg bg-stone-100 dark:bg-stone-800 text-[var(--color-texto)] flex items-center justify-center text-xs font-bold">+</button>
              </div>
            `;
            lista.appendChild(div);
          });
        }
        
        let total = EstadoAplicacion.carrito.reduce((acc, obj) => {
          let pVal = parseInt(obj.precio, 10);
          return acc + ((isNaN(pVal) ? 0 : pVal) * obj.cantidad);
        }, 0);
        
        this.referencias.carritoPrecioTotal.innerText = `${total} Bs.`;
      },
      actualizarPrevisualizadorRamo: function() {
        const config = EstadoAplicacion.simuladorRamo;
        const lienzo = this.referencias.simLienzoTextura;
        const txtEnvoltura = this.referencias.txtTexturaEnvoltura;
        const gipsoCapa = document.getElementById('lienzo-gipso');
        const organzaLazo = document.getElementById('lienzo-organza');
        const tulipanesContenedor = document.getElementById('lienzo-contenedor-tulipanes');

        // 1. Aplicar la Textura Visual según la opción elegida
        lienzo.className = "relative w-full aspect-[4/3] rounded-3xl overflow-hidden flex flex-col items-center justify-center p-4 border border-stone-200/10 transition-all duration-500 z-10";
        if (config.envoltura === 'terciopelo') {
          lienzo.classList.add('textura-terciopelo');
          txtEnvoltura.innerText = "Textura: Terciopelo Burdeos Premium ✦";
          txtEnvoltura.className = "text-[9px] font-bold text-amber-300 tracking-widest uppercase block drop-shadow-md";
        } else if (config.envoltura === 'coreano') {
          lienzo.classList.add('textura-coreano');
          txtEnvoltura.innerText = "Textura: Papel Coreano Translúcido Rosado";
          txtEnvoltura.className = "text-[9px] font-bold text-pink-700 tracking-widest uppercase block";
        } else if (config.envoltura === 'kraft') {
          lienzo.classList.add('textura-kraft');
          txtEnvoltura.innerText = "Textura: Papel Kraft Rústico Fibroso";
          txtEnvoltura.className = "text-[9px] font-bold text-stone-800 tracking-widest uppercase block";
        }

        // 2. Renderizar tulipanes con textura de Chenilla
        tulipanesContenedor.innerHTML = "";
        const cantidad = config.cantidadFlores;
        
        const paletaColores = [
          "radial-gradient(circle at 35% 35%, #f43f5e 15%, #be123c 65%, #6c041d 100%)",
          "radial-gradient(circle at 35% 35%, #fb7185 15%, #f43f5e 65%, #9f1239 100%)",
          "radial-gradient(circle at 35% 35%, #fda4af 15%, #f43f5e 65%, #4c0519 100%)",
          "radial-gradient(circle at 35% 35%, #fbbf24 15%, #d97706 65%, #78350f 100%)"
        ];

        for (let i = 0; i < cantidad; i++) {
          const tulipan = document.createElement('div');
          tulipan.className = "tulipan-chenilla transition-all duration-500";
          
          tulipan.style.width = "40px";
          tulipan.style.height = "52px";
          tulipan.style.background = paletaColores[i % paletaColores.length];
          
          const desplazamientoX = (i - (cantidad - 1) / 2) * 22; 
          const inclinacionRotacion = (i - (cantidad - 1) / 2) * 8;
          const elevacionY = Math.abs(i - (cantidad - 1) / 2) * 4 - 15;

          tulipan.style.transform = `translateX(${desplazamientoX}px) translateY(${elevacionY}px) rotate(${inclinacionRotacion}deg)`;
          tulipanesContenedor.appendChild(tulipan);
        }

        // 3. Activar/Desactivar Gipsófila
        if (config.follajeGipso) {
          gipsoCapa.classList.remove('opacity-0');
          gipsoCapa.classList.add('opacity-90');
        } else {
          gipsoCapa.classList.remove('opacity-90');
          gipsoCapa.classList.add('opacity-0');
        }

        // 4. Activar/Desactivar cinta de Organza
        if (config.follajeOrganza) {
          organzaLazo.style.transform = "scale(1)";
        } else {
          organzaLazo.style.transform = "scale(0)";
        }
      },
      renderizarPlantillasDedicatoria: function() {
        let cont = this.referencias.contenedorPlantillas;
        cont.innerHTML = "";
        
        PLANTILLAS_DEDICATORIA.forEach(p => {
          let chip = document.createElement('button');
          let esActivo = EstadoAplicacion.plantillaActivaId === p.id;
          chip.className = "chip-plantilla" + (esActivo ? " chip-plantilla-activo" : "");
          chip.innerText = p.cat;
          chip.dataset.id = p.id;
          
          chip.addEventListener('click', () => {
            Utilidades.vibrar();
            EstadoAplicacion.plantillaActivaId = p.id;
            this.referencias.carritoDedicatoria.value = p.texto;
            this.renderizarPlantillasDedicatoria();
            Utilidades.mostrarToast(`Mensaje "${p.cat}" cargado`);
          });
          
          cont.appendChild(chip);
        });
      }
    };

    const MotorEventos = {
      escucharDOM: function() {
        let r = MotorUI.referencias; let timer = null;
        
        r.buscador.addEventListener('input', e => {
          EstadoAplicacion.filtroActivo = "TODO"; MotorUI.renderizarHUD();
          clearTimeout(timer);
          timer = setTimeout(() => {
            EstadoAplicacion.textoBusqueda = e.target.value; MotorUI.renderizarCatalogo();
          }, 300);
        });

        r.hud.addEventListener('click', e => {
          let target = e.target.closest('.boton-filtro');
          if (target) {
            Utilidades.vibrar(); EstadoAplicacion.filtroActivo = target.dataset.categoria;
            MotorUI.renderizarHUD(); MotorUI.renderizarCatalogo();
          }
        });
        
        r.matriz.addEventListener('click', e => {
          if (e.target.classList.contains('imagen-item')) MotorUI.abrirZoom(e.target.dataset.url);
        });
        
        r.modal.addEventListener('click', () => MotorUI.cerrarZoom());
        r.panelScroll.addEventListener('scroll', () => {
          if (r.panelScroll.scrollTop > 300) r.btnSubir.classList.add('visible');
          else r.btnSubir.classList.remove('visible');
        });
        r.btnSubir.addEventListener('click', () => {
          Utilidades.vibrar(); r.panelScroll.scrollTo({ top: 0, behavior: 'smooth' });
        });

        window.addEventListener('offline', () => r.offline.classList.add('visible'));
        window.addEventListener('online', () => r.offline.classList.remove('visible'));
        
        // CONTROL DE DRAWER
        r.btnBolsaAbrir.addEventListener('click', () => {
          Utilidades.vibrar();
          r.drawer.classList.remove('translate-x-full');
          r.drawerOverlay.classList.add('activo'); 
          MotorUI.renderizarCarrito();
          MotorUI.renderizarPlantillasDedicatoria();
        });

        const cerrarPedidoDrawer = () => {
          Utilidades.vibrar();
          r.drawer.classList.add('translate-x-full');
          r.drawerOverlay.classList.remove('activo'); 
        };

        r.btnBolsaCerrar.addEventListener('click', cerrarPedidoDrawer);
        r.drawerOverlay.addEventListener('click', cerrarPedidoDrawer); 

        // CONTROL DE PESTAÑAS (TABS)
        r.tabCarrito.addEventListener('click', () => {
          Utilidades.vibrar();
          this.cambiarPestania('carrito');
        });
        r.tabTaller.addEventListener('click', () => {
          Utilidades.vibrar();
          this.cambiarPestania('taller');
          MotorUI.actualizarPrevisualizadorRamo();
        });

        // CONTROL DEL SIMULADOR
        r.simEnvoltorio.addEventListener('change', () => {
          EstadoAplicacion.simuladorRamo.envoltura = r.simEnvoltorio.value;
          MotorUI.actualizarPrevisualizadorRamo();
        });
        r.btnSimMenos.addEventListener('click', () => {
          Utilidades.vibrar();
          if (EstadoAplicacion.simuladorRamo.cantidadFlores > 1) {
            EstadoAplicacion.simuladorRamo.cantidadFlores--;
            r.simCantFlores.innerText = EstadoAplicacion.simuladorRamo.cantidadFlores;
            MotorUI.actualizarPrevisualizadorRamo();
          }
        });
        r.btnSimMas.addEventListener('click', () => {
          Utilidades.vibrar();
          if (EstadoAplicacion.simuladorRamo.cantidadFlores < 12) {
            EstadoAplicacion.simuladorRamo.cantidadFlores++;
            r.simCantFlores.innerText = EstadoAplicacion.simuladorRamo.cantidadFlores;
            MotorUI.actualizarPrevisualizadorRamo();
          }
        });
        r.simCheckGipso.addEventListener('change', () => {
          EstadoAplicacion.simuladorRamo.follajeGipso = r.simCheckGipso.checked;
          MotorUI.actualizarPrevisualizadorRamo();
        });
        r.simCheckOrganza.addEventListener('change', () => {
          EstadoAplicacion.simuladorRamo.follajeOrganza = r.simCheckOrganza.checked;
          MotorUI.actualizarPrevisualizadorRamo();
        });

        // AÑADIR RAMO PERSONALIZADO AL CARRITO
        r.btnAniadirRamo.addEventListener('click', () => {
          Utilidades.vibrar();
          this.agregarRamoPersonalizadoAlCarrito();
        });

        // ENVIAR COMPRA INTEGRAL A WHATSAPP
        r.btnEnviarPedido.addEventListener('click', () => {
          Utilidades.vibrar();
          this.enviarPedidoWhatsApp();
        });
      },
      sincronizarFirebase: function(db) {
        db.collection("flores").onSnapshot(snapshot => {
          let arr = []; let cats = new Set();
          
          snapshot.docs.forEach(doc => {
            let d = doc.data();
            let p = Utilidades.diseccionarNombre(d.nombre);
            cats.add(p.grupo);
            
            arr.push({
              id: doc.id, grupo: p.grupo, nombre: p.nombre,
              badgeNuevo: p.badgeNuevo, badgeEscaso: p.badgeEscaso,
              img: d.img || d.direccion, precio: d.precio
            });
          });
          
          EstadoAplicacion.datosProcesados = arr;
          EstadoAplicacion.categoriasUnicas = Array.from(cats).sort();
          
          MotorUI.renderizarHUD();
          MotorUI.renderizarCatalogo();
        });
      },
      alternarFavorito: function(idItem) {
        let index = EstadoAplicacion.favoritos.indexOf(idItem);
        if (index === -1) {
          EstadoAplicacion.favoritos.push(idItem);
          Utilidades.mostrarToast("Guardado en favoritos ♥", false);
        } else {
          EstadoAplicacion.favoritos.splice(index, 1);
        }
        localStorage.setItem('nivani_favs', JSON.stringify(EstadoAplicacion.favoritos));
        MotorUI.renderizarCatalogo();
      },
      agregarAlCarrito: function(producto) {
        let existente = EstadoAplicacion.carrito.find(obj => obj.id === producto.id);
        if (existente) {
          existente.cantidad++;
        } else {
          EstadoAplicacion.carrito.push({
            id: producto.id,
            nombre: producto.nombre,
            precio: producto.precio,
            img: producto.img,
            cantidad: 1
          });
        }
        MotorUI.actualizarContadoresPedido();
        Utilidades.mostrarToast("Agregado al Pedido");
      },
      cambiarCantidadCarrito: function(index, cambio) {
        Utilidades.vibrar();
        let item = EstadoAplicacion.carrito[index];
        if (item) {
          item.cantidad += cambio;
          if (item.cantidad <= 0) {
            EstadoAplicacion.carrito.splice(index, 1);
          }
          MotorUI.actualizarContadoresPedido();
          MotorUI.renderizarCarrito();
        }
      },
      cambiarPestania: function(tabName) {
        let r = MotorUI.referencias;
        if (tabName === 'carrito') {
          r.tabCarrito.className = "flex-1 py-4 text-center border-b-2 border-[var(--color-acento)] text-[var(--color-texto)]";
          r.tabTaller.className = "flex-1 py-4 text-center border-b-2 border-transparent text-[var(--color-texto-sec)] hover:text-[var(--color-texto)]";
          r.seccionTabCarrito.classList.remove('hidden');
          r.seccionTabTaller.classList.add('hidden');
        } else {
          r.tabTaller.className = "flex-1 py-4 text-center border-b-2 border-[var(--color-acento)] text-[var(--color-texto)]";
          r.tabCarrito.className = "flex-1 py-4 text-center border-b-2 border-transparent text-[var(--color-texto-sec)] hover:text-[var(--color-texto)]";
          r.seccionTabTaller.classList.remove('hidden');
          r.seccionTabCarrito.classList.add('hidden');
        }
      },
      agregarRamoPersonalizadoAlCarrito: function() {
        const config = EstadoAplicacion.simuladorRamo;
        let subtotalFlores = config.cantidadFlores * 35;
        let precioEnv = config.envoltura === 'terciopelo' ? 35 : (config.envoltura === 'coreano' ? 20 : 15);
        let totalRamo = subtotalFlores + precioEnv;
        
        let extras = [];
        if (config.follajeGipso) { totalRamo += 15; extras.push("Gipsófila"); }
        if (config.follajeOrganza) { totalRamo += 10; extras.push("Organza"); }

        let descTextura = config.envoltura === 'terciopelo' ? "Terciopelo" : (config.envoltura === 'coreano' ? "Coreano" : "Kraft");
        let nombreRamo = `Ramo Personalizado ${descTextura} (${config.cantidadFlores} Tulipanes)`;
        if (extras.length > 0) nombreRamo += ` + ${extras.join(' & ')}`;

        EstadoAplicacion.carrito.push({
          id: 'personalizado_' + Date.now(),
          nombre: nombreRamo,
          precio: totalRamo,
          img: null,
          fancyRamo: true,
          cantidad: 1
        });

        MotorUI.actualizarContadoresPedido();
        Utilidades.mostrarToast("¡Ramo Creado con Éxito!");
        this.cambiarPestania('carrito');
        MotorUI.renderizarCarrito();
      },
      enviarPedidoWhatsApp: function() {
        if (EstadoAplicacion.carrito.length === 0) {
          Utilidades.mostrarToast("Añade una flor o diseña un ramo primero.", false);
          return;
        }

        const canales = document.getElementsByName('wpp-linea-destino');
        let canalElegido = "linea1";
        for (let i = 0; i < canales.length; i++) {
          if (canales[i].checked) {
            canalElegido = canales[i].value;
            break;
          }
        }
        const wppNumero = VECTORES_WPP[canalEenero] || VECTORES_WPP.linea1;

        let msg = `✦ *NIVANI | SOLICITUD DE PEDIDO ATELIER* ✦\n\n`;
        let totalGeneral = 0;

        EstadoAplicacion.carrito.forEach((item, index) => {
          let pVal = parseInt(item.precio, 10);
          let sub = (isNaN(pVal) ? 0 : pVal) * item.cantidad;
          totalGeneral += sub;
          msg += `*${index + 1}. ${item.nombre}*\n`;
          msg += `    Cant: ${item.cantidad} x ${item.precio} Bs. | Sub: ${sub} Bs.\n\n`;
        });

        msg += `--------------------------------\n`;
        msg += `*TOTAL DE TU COMBINACIÓN:* ${totalGeneral} Bs.\n\n`;

        const dedicatoria = document.getElementById('carrito-dedicatoria').value.trim();
        if (dedicatoria !== "") {
          msg += `💌 *TARJETA DEDICATORIA (${EstadoAplicacion.estiloTarjetaDedicatoria.toUpperCase()}):*\n`;
          msg += `"${dedicatoria}"\n\n`;
        }

        msg += `¿Se encuentra disponible para coordinar la entrega? Muchas gracias.`;

        const link = `https://wa.me/${wppNumero}?text=${encodeURIComponent(msg)}`;
        window.open(link, '_blank');
      }
    };

    function cambiarEstiloDedicatoria(estilo) {
      EstadoAplicacion.estiloTarjetaDedicatoria = estilo;
      Utilidades.vibrar();
      Utilidades.mostrarToast(`Tarjeta: Acabado ${estilo.toUpperCase()} listo`);
    }

    document.addEventListener('DOMContentLoaded', () => {
      let db = MotorConexion.iniciar();
      MotorUI.mapearNodos();
      
      const plantillaPorDefecto = PLANTILLAS_DEDICATORIA.find(p => p.id === EstadoAplicacion.plantillaActivaId);
      if (plantillaPorDefecto) {
        MotorUI.referencias.carritoDedicatoria.value = plantillaPorDefecto.texto;
      }
      
      MotorEventos.escucharDOM();
      MotorEventos.sincronizarFirebase(db);
      if (!navigator.onLine) MotorUI.referencias.offline.classList.add('visible');
    });
  </script>
</body>
</html>
